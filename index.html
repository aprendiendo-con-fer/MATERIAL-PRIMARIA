<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Interactivo  Primaria| Mtra. María Fernanda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%); min-height: 100vh; overflow-x: hidden; }
        .font-kids { font-family: 'Fredoka One', cursive; }
        .btn-bounce { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .btn-bounce:hover { transform: scale(1.05) rotate(1deg); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 4px solid #fff; }
        .input-kids { @apply w-full text-center p-4 rounded-2xl border-4 border-blue-100 focus:border-pink-300 outline-none mb-3 shadow-inner text-lg; }
        .hidden { display: none; }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="p-4">

    <header id="main-header" class="hidden max-w-6xl mx-auto flex justify-between items-center bg-white p-4 rounded-3xl shadow-xl border-b-8 border-blue-200 mb-8 sticky top-4 z-50 animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <div class="bg-blue-500 p-2 rounded-2xl text-white text-2xl floating">🏫</div>
            <h1 class="font-kids text-blue-600 text-lg uppercase hidden sm:block"> Material Interactivo Primaria</h1>
        </div>
        <div class="flex gap-3 items-center">
            <div class="flex items-center gap-4 bg-blue-50 p-2 px-4 rounded-2xl border-2 border-blue-100">
                <span id="display-user" class="text-blue-600 font-kids text-[10px] border-l pl-4 hidden md:block uppercase"></span>
            </div>
            <button onclick="cerrarSesion()" class="bg-red-100 text-red-500 p-2 px-4 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">SALIR 🚪</button>
        </div>
    </header>
    <section id="view-auth" class="text-center py-10 animate__animated animate__fadeIn">
        <div class="glass p-8 rounded-[3rem] shadow-2xl inline-block w-full max-w-md border-dashed border-pink-300">
            <div class="text-7xl mb-4 floating">🚀</div>
            <h2 id="auth-title" class="font-kids text-3xl text-pink-500 mb-2">¡Bienvenidos!</h2>
            <p class="text-blue-500 font-bold text-sm mb-6">Mtra. María Fernanda Flores V.</p>

            <input type="text" id="auth-user" placeholder="Usuario" class="input-kids">
            <input type="password" id="auth-pass" placeholder="Contraseña" class="input-kids">
            
            <div id="login-controls">
                <button onclick="intentarLogin()" class="btn-bounce bg-blue-500 text-white font-kids text-xl w-full py-4 rounded-2xl shadow-lg mb-4">ENTRAR 🔑</button>
               
            </div>

            <div id="register-controls" class="hidden">
                <button onclick="intentarRegistro()" class="btn-bounce bg-pink-500 text-white font-kids text-xl w-full py-4 rounded-2xl shadow-lg mb-4">REGISTRARME ✨</button>
                <p class="text-sm">¿Ya tienes cuenta? <a href="#" onclick="switchAuth(false)" class="text-blue-500 font-bold underline">Inicia sesión</a></p>
            </div>
        </div>
    </section>
<section id="view-phases" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 animate__animated animate__backInUp">

    <button onclick="cargarJuegos(3)" class="btn-bounce bg-orange-400 p-8 rounded-[3rem] border-b-8 border-orange-600 text-white shadow-xl">
        <div class="text-7xl mb-4">🖍️</div>
        <h3 class="font-kids text-3xl italic">FASE 3</h3>
    </button>

    <button onclick="cargarJuegos(4)" class="btn-bounce bg-green-500 p-8 rounded-[3rem] border-b-8 border-green-700 text-white shadow-xl">
        <div class="text-7xl mb-4">🧪</div>
        <h3 class="font-kids text-3xl italic">FASE 4</h3>
    </button>

    <button onclick="cargarJuegos(5)" class="btn-bounce bg-purple-500 p-8 rounded-[3rem] border-b-8 border-purple-700 text-white shadow-xl">

<script>

window.addEventListener("DOMContentLoaded", function(){
    const sesionActiva = localStorage.getItem("sesion_activa");

    if(sesionActiva === "si"){
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('main-header').classList.remove('hidden');
        document.getElementById('view-phases').classList.remove('hidden');
    }
});

/* ===========================
   CONFIGURACIÓN MAESTRA
=========================== */

let PASSWORD_MENSUAL = localStorage.getItem("password_mensual") || "abril26";

const USUARIO_GENERAL = "docentepro";

const ADMIN_USER = "mtrafer";
const ADMIN_PASS = "admin123";

/* ===========================
   LOGIN
=========================== */

function intentarLogin() {
    const u = document.getElementById('auth-user').value.trim();
    const p = document.getElementById('auth-pass').value.trim();

    // ADMIN
    if (u === ADMIN_USER && p === ADMIN_PASS) {
        mostrarPanelAdmin();
        return;
    }

    // ACCESO GENERAL MENSUAL
  if (u === USUARIO_GENERAL && p === PASSWORD_MENSUAL) {
    document.getElementById('view-auth').classList.add('hidden');
    document.getElementById('main-header').classList.remove('hidden');
    document.getElementById('view-phases').classList.remove('hidden');
    document.getElementById('display-user').innerText = "BIENVENIDO";

    localStorage.setItem("sesion_activa", "si");

} else {
    alert("❌ Usuario o contraseña incorrectos.");
}
}

/* ===========================
   PANEL ADMIN
=========================== */

function mostrarPanelAdmin() {
    document.getElementById('view-auth').innerHTML = `
        <div class="glass p-8 rounded-[3rem] shadow-2xl inline-block w-full max-w-md border-dashed border-purple-300 text-center">
            <div class="text-6xl mb-4">👩‍🏫</div>
            <h2 class="font-kids text-2xl text-purple-600 mb-4">Panel de Maestra</h2>

            <p class="mb-2 font-bold text-sm">Contraseña mensual actual:</p>
            <div class="bg-gray-100 p-3 rounded-xl mb-4 font-bold text-purple-700">
                ${PASSWORD_MENSUAL}
            </div>

            <input type="text" id="nuevaPass" placeholder="Nueva contraseña mensual"
            class="w-full text-center p-3 rounded-xl border-2 border-purple-200 mb-4">

            <button onclick="cambiarPassword()" 
            class="bg-purple-500 text-white px-6 py-3 rounded-2xl font-bold shadow-lg w-full">
            Cambiar contraseña
            </button>

            <button onclick="cerrarSesion()" 
            class="mt-4 text-sm text-gray-500 underline">
            Cerrar sesión
            </button>
        </div>
    `;
}

function cambiarPassword() {
    const nueva = document.getElementById("nuevaPass").value.trim();
    if (!nueva) return alert("Escribe una contraseña válida");

    PASSWORD_MENSUAL = nueva;
    localStorage.setItem("password_mensual", nueva);
    alert("✅ Contraseña mensual actualizada");
    location.reload();
}

/* ===========================
   NAVEGACIÓN (NO TOCADA)
=========================== */

function cerrarSesion() { 
    localStorage.removeItem("sesion_activa");
    location.reload(); 
}
function volverMenu() {   
    document.getElementById('view-game-list').classList.add('hidden');   
    document.getElementById('view-phases').classList.remove('hidden');   
}

<section id="view-game-list" class="hidden p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

        🏠 Volver al menú
    </button>
</section>


<script>
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
    if (e.key === "F12") e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key)) e.preventDefault();
    if (e.ctrlKey && e.key === "U") e.preventDefault();
});
</script>
