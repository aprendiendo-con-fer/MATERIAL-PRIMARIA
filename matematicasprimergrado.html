<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matemáticas Primer Grado</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; }
        .title-font { font-family: 'Fredoka One', cursive; }
        
        .game-btn {
            transition: all 0.3s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }
        .game-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }
        .game-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        
        .bounce { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); }
        }
        
        .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .game-screen {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F4FF 100%);
        }
        
        .draggable { cursor: grab; user-select: none; }
        .draggable:active { cursor: grabbing; }
        
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.highlight { 
            background: rgba(255,255,0,0.3); 
            border: 3px dashed #FFD700;
        }
        
        .success-animation {
            animation: successPop 0.5s ease-out;
        }
        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .star-burst { animation: starBurst 0.6s ease-out forwards; }
        @keyframes starBurst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2) rotate(180deg); opacity: 0; }
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="min-h-full w-full game-screen"><!-- Main Menu -->
   <div id="mainMenu" class="min-h-full w-full flex flex-col"><!-- Header -->
    <header class="py-6 px-4 text-center relative overflow-hidden">
     <div class="absolute top-2 left-4 text-4xl float">
      🌟
     </div>
     <div class="absolute top-2 right-4 text-4xl float" style="animation-delay: 0.5s;">
      ✨
     </div>
     <div class="absolute top-8 left-1/4 text-2xl sparkle">
      ⭐
     </div>
     <div class="absolute top-8 right-1/4 text-2xl sparkle" style="animation-delay: 0.7s;">
      🌈
     </div>
     <h1 id="mainTitle" class="title-font text-4xl md:text-5xl lg:text-6xl text-blue-600 drop-shadow-lg mb-2 bounce">🎓 Matemáticas Primer Grado 🎓</h1>
     <p class="text-lg md:text-xl text-blue-500 font-semibold">¡Aprende jugando! Elige tu aventura matemática 🚀</p>
    </header><!-- Games Grid -->
    <main class="flex-1 px-4 pb-4">
     <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"><!-- Game 1: Numbers 1-10 --> <button onclick="startGame(1)" class="game-btn bg-gradient-to-br from-orange-400 to-orange-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🍎🧺
       </div><h3 class="title-font text-lg mb-1">Recolección en el Huerto</h3><p class="text-xs opacity-90 mb-2">Los números del 1 al 10</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Contar del 1 al 10 y reconocer cantidades
       </div></button> <!-- Game 2: Tens and Units --> <button onclick="startGame(2)" class="game-btn bg-gradient-to-br from-purple-400 to-purple-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🚀🔋
       </div><h3 class="title-font text-lg mb-1">Combustible Espacial</h3><p class="text-xs opacity-90 mb-2">Decenas y unidades</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Formar números con decenas y unidades
       </div></button> <!-- Game 3: Money --> <button onclick="startGame(3)" class="game-btn bg-gradient-to-br from-green-400 to-green-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🛒💰
       </div><h3 class="title-font text-lg mb-1">Cajero del Súper</h3><p class="text-xs opacity-90 mb-2">La Tiendita (Dinero)</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Usar monedas de $1, $5 y $10
       </div></button> <!-- Game 4: Addition --> <button onclick="startGame(4)" class="game-btn bg-gradient-to-br from-red-400 to-red-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🍕👨‍🍳
       </div><h3 class="title-font text-lg mb-1">Pizza del Chef</h3><p class="text-xs opacity-90 mb-2">Sumas con dibujos</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Sumar cantidades pequeñas
       </div></button> <!-- Game 5: Subtraction --> <button onclick="startGame(5)" class="game-btn bg-gradient-to-br from-pink-400 to-pink-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🎈🎯
       </div><h3 class="title-font text-lg mb-1">Globos en la Feria</h3><p class="text-xs opacity-90 mb-2">Restas</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Restar de forma divertida
       </div></button> <!-- Game 6: Geometric Shapes --> <button onclick="startGame(6)" class="game-btn bg-gradient-to-br from-cyan-400 to-cyan-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🤖🔷
       </div><h3 class="title-font text-lg mb-1">Robot Constructor</h3><p class="text-xs opacity-90 mb-2">Figuras geométricas</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Círculos, cuadrados y triángulos
       </div></button> <!-- Game 8: Number Series --> <button onclick="startGame(8)" class="game-btn bg-gradient-to-br from-amber-400 to-amber-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🚂🌉
       </div><h3 class="title-font text-lg mb-1">El Puente del Tren</h3><p class="text-xs opacity-90 mb-2">Series numéricas</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Completar secuencias de números
       </div></button> <!-- Game 11: Capacity --> <button onclick="startGame(11)" class="game-btn bg-gradient-to-br from-sky-400 to-sky-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🥤🎉
       </div><h3 class="title-font text-lg mb-1">Fiesta de Jugos</h3><p class="text-xs opacity-90 mb-2">Capacidad (Lleno/Vacío)</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Comparar cantidades de líquido
       </div></button> <!-- Game 14: Groups of 10 --> <button onclick="startGame(14)" class="game-btn bg-gradient-to-br from-fuchsia-400 to-fuchsia-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🍬🏭
       </div><h3 class="title-font text-lg mb-1">Fábrica de Dulces</h3><p class="text-xs opacity-90 mb-2">Agrupamientos de 10</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Agrupar de 10 en 10
       </div></button> <!-- Game 15: Mental Problems --> <button onclick="startGame(15)" class="game-btn bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl p-4 text-white text-left">
       <div class="text-3xl mb-2">
        🦁🔍
       </div><h3 class="title-font text-lg mb-1">Misterio en el Zoológico</h3><p class="text-xs opacity-90 mb-2">Problemas mentales</p>
       <div class="bg-white/20 rounded-lg p-2 text-xs">
        📚 <strong>Aprenderás:</strong> Resolver problemas rápidamente
       </div></button>
     </div>
    </main><!-- Footer -->
    <footer class="py-4 text-center bg-blue-100/50">
     <p id="authorCredit" class="text-blue-600 font-semibold text-sm">📝 Material creado por Maestra María Fernanda Flores Valenzuela</p>
     <p class="text-blue-400 text-xs mt-1">© 2024 - Todos los derechos reservados</p>
    </footer>
   </div><!-- Game Container -->
   <div id="gameContainer" class="hidden min-h-full w-full flex flex-col"></div>
  </div>
  <script>
        // Configuration
        const defaultConfig = {
            main_title: '🎓 Matemáticas Primer Grado 🎓',
            author_credit: '📝 Material creado por Maestra María Fernanda Flores Valenzuela',
            background_color: '#E0F4FF',
            text_color: '#1E40AF',
            button_color: '#F97316'
        };
        
        let config = { ...defaultConfig };
        let currentGame = null;
        let gameState = {};
        
        // Element SDK initialization
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange: async (newConfig) => {
                    config = { ...defaultConfig, ...newConfig };
                    document.getElementById('mainTitle').textContent = config.main_title;
                    document.getElementById('authorCredit').textContent = config.author_credit;
                },
                mapToCapabilities: (cfg) => ({
                    recolorables: [
                        {
                            get: () => cfg.background_color || defaultConfig.background_color,
                            set: (v) => window.elementSdk.setConfig({ background_color: v })
                        },
                        {
                            get: () => cfg.text_color || defaultConfig.text_color,
                            set: (v) => window.elementSdk.setConfig({ text_color: v })
                        }
                    ],
                    borderables: [],
                    fontEditable: undefined,
                    fontSizeable: undefined
                }),
                mapToEditPanelValues: (cfg) => new Map([
                    ['main_title', cfg.main_title || defaultConfig.main_title],
                    ['author_credit', cfg.author_credit || defaultConfig.author_credit]
                ])
            });
        }
        
        // Game navigation
        function showMenu() {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('gameContainer').classList.add('hidden');
            document.getElementById('gameContainer').innerHTML = '';
            currentGame = null;
            gameState = {};
        }
        
        function startGame(gameNumber) {
            currentGame = gameNumber;
            gameState = { score: 0, level: 1, attempts: 0 };
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('gameContainer').classList.remove('hidden');
            
            const games = {
                1: renderGame1,
                2: renderGame2,
                3: renderGame3,
                4: renderGame4,
                5: renderGame5,
                6: renderGame6,
                8: renderGame8,
                11: renderGame11,
                14: renderGame14,
                15: renderGame15
            };
            
            if (games[gameNumber]) {
                games[gameNumber]();
            }
        }
        
        // Utility functions
        function createGameHeader(title, emoji, learningContent) {
            return `
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 p-4 text-white shadow-lg">
                    <div class="max-w-4xl mx-auto flex items-center justify-between flex-wrap gap-2">
                        <button onclick="showMenu()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full font-bold transition flex items-center gap-2">
                            ⬅️ Menú
                        </button>
                        <h2 class="title-font text-xl md:text-2xl text-center flex-1">${emoji} ${title}</h2>
                        <div class="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold">
                            ⭐ <span id="score">${gameState.score}</span> pts
                        </div>
                    </div>
                    <div class="max-w-4xl mx-auto mt-2 bg-white/20 rounded-lg p-2 text-center text-sm">
                        📚 <strong>Contenido:</strong> ${learningContent}
                    </div>
                </div>
            `;
        }
        
        function updateScore(points) {
            gameState.score += points;
            const scoreEl = document.getElementById('score');
            if (scoreEl) {
                scoreEl.textContent = gameState.score;
                scoreEl.parentElement.classList.add('success-animation');
                setTimeout(() => scoreEl.parentElement.classList.remove('success-animation'), 500);
            }
        }
        
        function showSuccess(message) {
            const container = document.getElementById('gameContainer');
            const successDiv = document.createElement('div');
            successDiv.className = 'fixed inset-0 flex items-center justify-center z-50 pointer-events-none';
            successDiv.innerHTML = `
                <div class="bg-green-500 text-white px-8 py-4 rounded-2xl text-2xl font-bold shadow-2xl success-animation">
                    ✅ ${message}
                </div>
            `;
            container.appendChild(successDiv);
            createConfetti();
            setTimeout(() => successDiv.remove(), 2000);
        }
        
        function showError(message) {
            const container = document.getElementById('gameContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed inset-0 flex items-center justify-center z-50 pointer-events-none';
            errorDiv.innerHTML = `
                <div class="bg-red-500 text-white px-8 py-4 rounded-2xl text-2xl font-bold shadow-2xl shake">
                    ❌ ${message}
                </div>
            `;
            container.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 1500);
        }
        
        function createConfetti() {
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.getElementById('gameContainer').appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }
        
        // ===== GAME 1: Harvest Collection (Numbers 1-10) =====
        function renderGame1() {
            const container = document.getElementById('gameContainer');
            gameState.targetNumber = Math.floor(Math.random() * 10) + 1;
            
            container.innerHTML = `
                ${createGameHeader('Recolección en el Huerto', '🍎', 'Contar del 1 al 10 y reconocer cantidades')}
                <div class="flex-1 p-4 overflow-auto" style="background: linear-gradient(180deg, #87CEEB 0%, #90EE90 50%, #8B4513 100%);">
                    <div class="max-w-4xl mx-auto">
                        <!-- Farmer -->
                        <div class="text-center mb-6">
                            <div class="inline-block bg-white/90 rounded-2xl p-4 shadow-lg">
                                <div class="text-6xl mb-2">👨‍🌾</div>
                                <p class="text-lg font-bold text-amber-800">¡Hola! Necesito exactamente</p>
                                <div class="text-5xl font-bold text-green-600 my-2 title-font" id="targetNum">${gameState.targetNumber}</div>
                                <p class="text-lg font-bold text-amber-800">frutas. ¡Haz clic en la canasta correcta!</p>
                            </div>
                        </div>
                        
                        <!-- Baskets -->
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4" id="basketsContainer">
                        </div>
                        
                        <div class="text-center mt-6">
                            <button onclick="newRoundGame1()" class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-full font-bold text-lg shadow-lg transition transform hover:scale-105">
                                🔄 Nueva Ronda
                            </button>
                        </div>
                    </div>
                </div>
                <footer class="py-2 text-center bg-amber-100">
                    <p class="text-amber-800 text-sm font-semibold">📝 Material creado por Maestra María Fernanda Flores Valenzuela</p>
                </footer>
            `;
            
            generateBaskets1();
        }
        
        function generateBaskets1() {
            const container = document.getElementById('basketsContainer');
            const fruits = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🍒', '🥝', '🍌', '🍐'];
            const numbers = [];
            numbers.push(gameState.targetNumber);
            while (numbers.length < 5) {
                const num = Math.floor(Math.random() * 10) + 1;
                if (!numbers.includes(num)) numbers.push(num);
            }
            numbers.sort(() => Math.random() - 0.5);
            
            container.innerHTML = numbers.map(num => {
                const fruit = fruits[Math.floor(Math.random() * fruits.length)];
                const fruitsDisplay = Array(num).fill(fruit).join('');
                return `
                    <button onclick="checkBasket1(${num})" class="bg-amber-100 hover:bg-amber-200 rounded-2xl p-4 shadow-lg transition transform hover:scale-105 border-4 border-amber-300">
                        <div class="text-4xl mb-2">🧺</div>
                        <div class="text-2xl flex flex-wrap justify-center gap-1">${fruitsDisplay}</div>
                        <div class="mt-2 text-amber-600 font-bold">(${num} frutas)</div>
                    </button>
                `;
            }).join('');
        }
        
        function checkBasket1(num) {
            if (num === gameState.targetNumber) {
                updateScore(10);
                showSuccess('¡Excelente! 🎉');
                setTimeout(newRoundGame1, 1500);
            } else {
                showError('¡Intenta de nuevo!');
            }
        }
        
        function newRoundGame1() {
            gameState.targetNumber = Math.floor(Math.random() * 10) + 1;
            document.getElementById('targetNum').textContent = gameState.targetNumber;
            generateBaskets1();
        }
        
        // ===== GAME 2: Space Fuel (Tens and Units) =====
        function renderGame2() {
            const container = document.getElementById('gameContainer');
            gameState.targetNumber = Math.floor(Math.random() * 90) + 10;
            gameState.currentTens = 0;
            gameState.currentUnits = 0;
            
            container.innerHTML = `
                ${createGameHeader('Combustible Espacial', '🚀', 'Formar números con decenas y unidades')}
                <div class="flex-1 p-4 overflow-auto" style="background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 50%, #2a2a6e 100%);">
                    <div class="max-w-4xl mx-auto">
                        <!-- Target -->
                        <div class="text-center mb-4">
                            <div class="inline-block bg-gradient-to-r from-purple-600 to-blue-600 rounded-2xl p-4 shadow-lg text-white">
                                <p class="text-lg">🎯 Carga el cohete con:</p>
                                <div class="text-5xl font-bold title-font my-2" id="targetNum2">${gameState.targetNumber}</div>
                                <p class="text-sm">unidades de combustible</p>
                            </div>
                        </div>
                        
                        <!-- Rocket and Controls -->
                        <div class="grid md:grid-cols-2 gap-6">
                            <!-- Controls -->
                            <div class="bg-gray-800/80 rounded-2xl p-4">
                                <h3 class="text-white text-center font-bold mb-4">⚡ Panel de Control</h3>
                                
                                <!-- Tens -->
                                <div class="bg-blue-900/50 rounded-xl p-4 mb-4">
                                    <p class="text-blue-300 text-center mb-2">Tanques de 10 🔋</p>
                                    <div class="flex items-center justify-center gap-4">
                                        <button onclick="adjustFuel2('tens', -1)" class="bg-red-500 hover:bg-red-600 w-12 h-12 rounded-full text-white text-2xl font-bold">-</button>
                                        <span class="text-4xl font-bold text-white" id="tensCount">0</span>
                                        <button onclick="adjustFuel2('tens', 1)" class="bg-green-500 hover:bg-green-600 w-12 h-12 rounded-full text-white text-2xl font-bold">+</button>
                                    </div>
                                    <div class="flex justify-center gap-1 mt-2" id="tensVisual"></div>
                                </div>
                                
                                <!-- Units -->
                                <div class="bg-purple-900/50 rounded-xl p-4">
                                    <p class="text-purple-300 text-center mb-2">Celdas de 1 🔌</p>
                                    <div class="flex items-center justify-center gap-4">
                                        <button onclick="adjustFuel2('units', -1)" class="bg-red-500 hover:bg-red-600 w-12 h-12 rounded-full text-white text-2xl font-bold">-</button>
                                        <span class="text-4xl font-bold text-white" id="unitsCount">0</span>
                                        <button onclick="adjustFuel2('units', 1)" class="bg-green-500 hover:bg-green-600 w-12 h-12 rounded-full text-white text-2xl font-bold">+</button>
                                    </div>
                                    <div class="flex justify-center gap-1 mt-2 flex-wrap" id="unitsVisual"></div>
                                </div>
                                
                                <!-- Total -->
                                <div class="mt-4 text-center">
                                    <p class="text-gray-300">Total cargado:</p>
                                    <div class="text-4xl font-bold text-yellow-400" id="totalFuel">0</div>
                                </div>
                            </div>
                            
                            <!-- Rocket -->
                            <div class="flex flex-col items-center justify-center">
                                <div id="rocket2" class="text-8xl transition-transform duration-500">🚀</div>
                                <button onclick="launchRocket2()" class="mt-4 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white px-8 py-4 rounded-full font-bold text-xl shadow-lg transition transform hover:scale-105">
                                    🔥 ¡DESPEGAR!
                                </button>
                            </div>
                        </div>
                        
                        <div class="text-center mt-4">
                            <button onclick="newRoundGame2()" class="bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded-full font-bold shadow-lg transition">
                                🔄 Nuevo Número
                            </button>
                        </div>
                    </div>
                </div>
                <footer class="py-2 text-center bg-purple-900">
                    <p class="text-purple-200 text-sm font-semibold">📝 Material creado por Maestra María Fernanda Flores Valenzuela</p>
                </footer>
            `;
        }
        
        function adjustFuel2(type, delta) {
            if (type === 'tens') {

            while (blankIndices.length < 2) {
                const idx = Math.floor(Math.random() * pattern.length);
                if (!blankIndices.includes(idx)) blankIndices.push(idx);

            gameState.blanks = blankIndices.sort((a, b) => a - b);

        function validateBridge8() {

        function fillGlass11(id) {
            const glass = gameState.glasses.find(g => g.id === id);
            if (glass.fill < glass.maxFill) {
                glass.fill++;
                const percentage = (glass.fill / glass.maxFill) * 100;
                document.getElementById('liquid' + id).style.height = percentage + '%';
                document.getElementById('level' + id).textContent = glass.fill;
            }
        }
        
        function selectGlass11(type, id) {
            const fills = gameState.glasses.map(g => g.fill);
            const maxFill = Math.max(...fills);
            const minFill = Math.min(...fills);
            const selectedGlass = gameState.glasses.find(g => g.id === id);
            
            if (fills.every(f => f === 0)) {
                showError('¡Primero llena los vasos!');
                return;
            }
            
            if (type === 'more' && selectedGlass.fill === maxFill && fills.filter(f => f === maxFill).length === 1) {
                updateScore(10);
                showSuccess('¡Correcto! Tiene más líquido');
                setTimeout(resetGlasses11, 1500);
            } else if (type === 'less' && selectedGlass.fill === minFill && fills.filter(f => f === minFill).length === 1) {
                updateScore(10);
                showSuccess('¡Correcto! Tiene menos líquido');
                setTimeout(resetGlasses11, 1500);
            } else {
                showError('¡Observa bien los niveles!');
            }
        }
