<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juegos Educativos - Ética, Naturaleza y Sociedades</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    .game-btn {
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .game-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }
    .game-btn:active {
      transform: translateY(0);
    }
    .content-box {
      background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
      border: 3px solid #7dd3fc;
      border-radius: 20px;
    }
    .pda-badge {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 2px solid #f59e0b;
    }
    .back-btn {
      transition: all 0.2s ease;
    }
    .back-btn:hover {
      background-color: #0284c7;
    }
    @keyframes bounce-soft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-bounce-soft {
      animation: bounce-soft 2s infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .sparkle {
      animation: sparkle 1.5s infinite;
    }
    .draggable {
      cursor: grab;
      user-select: none;
    }
    .draggable:active {
      cursor: grabbing;
    }
    .drop-zone {
      transition: all 0.3s ease;
    }
    .drop-zone.highlight {
      background-color: #bfdbfe;
      border-color: #3b82f6;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto" style="background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 50%, #ffffff 100%);">
  <div id="app" class="min-h-full p-4 md:p-6"><!-- Main Menu -->
   <div id="main-menu" class="max-w-6xl mx-auto">
    <div class="text-center mb-6">
     <h1 id="main-title" class="text-2xl md:text-4xl font-extrabold text-sky-700 mb-2">🌿 Ética, Naturaleza y Sociedades 🌍</h1>
     <p class="text-sky-600 text-lg font-semibold">Campo Formativo - 3° de Primaria</p>
     <p class="text-sky-500 mt-1">¡Selecciona un juego para aprender y divertirte!</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="games-grid"><!-- Game buttons will be inserted here -->
    </div>
    <footer class="mt-8 text-center">
     <p id="teacher-credit" class="text-sky-600 font-semibold text-sm md:text-base">📚 Material elaborado por Mtra. Maria Fernanda Flores Valenzuela</p>
    </footer>
   </div><!-- Game Container (hidden by default) -->
   <div id="game-container" class="hidden max-w-4xl mx-auto"><button onclick="goBack()" class="back-btn mb-4 bg-sky-600 text-white px-6 py-2 rounded-full font-bold flex items-center gap-2 hover:bg-sky-700"> ⬅️ Volver al Menú </button>
    <div id="game-content" class="content-box p-6"><!-- Game content loaded dynamically -->
    </div>
    <footer class="mt-6 text-center">
     <p id="game-teacher-credit" class="text-sky-600 font-semibold text-sm">📚 Material elaborado por Mtra. Maria Fernanda Flores Valenzuela</p>
    </footer>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_title: 'Ética, Naturaleza y Sociedades',
      teacher_name: 'Mtra. Maria Fernanda Flores Valenzuela',
      primary_color: '#0284c7',
      secondary_color: '#7dd3fc',
      background_color: '#e0f2fe',
      text_color: '#0c4a6e',
      accent_color: '#f59e0b'
    };

    const games = [
      {
        id: 1,
        title: '🗺️ Búsqueda del Tesoro Cartográfico',
        content: 'Representaciones cartográficas',
        pda: 'Elabora representaciones de su localidad considerando los puntos cardinales y los ecosistemas como sustento de la vida.',
        color: 'bg-emerald-500 hover:bg-emerald-600'
      },
      {
        id: 2,
        title: '💧 Equilibrio Ambiental',
        content: 'Valoración de los ecosistemas',
        pda: 'Indaga las interacciones de su comunidad con el ecosistema (plantas, animales, suelo, agua) y evalúa su impacto.',
        color: 'bg-blue-500 hover:bg-blue-600'
      },
      {
        id: 3,
        title: '🌳 Viaje con el Abuelo Sabio',
        content: 'Interculturalidad y sustentabilidad',
        pda: 'Reconoce cómo los pueblos originarios se relacionan con la naturaleza con respeto y reciprocidad.',
        color: 'bg-amber-500 hover:bg-amber-600'
      },
      {
        id: 4,
        title: '🔍 Eco-Detective',
        content: 'Cuidado de los ecosistemas',
        pda: 'Reflexiona sobre situaciones de riesgo o amenazas a la preservación de la naturaleza en su localidad.',
        color: 'bg-red-500 hover:bg-red-600'
      },
      {
        id: 5,
        title: '🎒 Mochila de Emergencia',
        content: 'Acciones de prevención de desastres',
        pda: 'Localiza en mapas zonas de seguridad ante fenómenos naturales (sismos, inundaciones) y elabora croquis de rutas.',
        color: 'bg-orange-500 hover:bg-orange-600'
      },
      {
        id: 6,
        title: '🏔️ Creador de Paisajes',
        content: 'Caracterización del territorio',
        pda: 'Identifica las características de su comunidad (clima, suelo, vegetación, fauna y cuerpos de agua) y las representa en dibujos o mapas.',
        color: 'bg-teal-500 hover:bg-teal-600'
      },
      {
        id: 7,
        title: '🎴 Memorama Cultural',
        content: 'Composición sociocultural',
        pda: 'Dialoga sobre las aportaciones de pueblos originarios, afromexicanos y migrantes a la cultura y memoria colectiva.',
        color: 'bg-purple-500 hover:bg-purple-600'
      },
      {
        id: 8,
        title: '⏰ Máquina del Tiempo',
        content: 'Vida cotidiana antigua',
        pda: 'Indaga sobre pueblos originarios antes de la invasión europea: cómo vivían, qué comían y cómo se organizaban.',
        color: 'bg-indigo-500 hover:bg-indigo-600'
      },
      {
        id: 9,
        title: '🦅 Taller del Escudo Nacional',
        content: 'Origen de los símbolos',
        pda: 'Reconoce los símbolos nacionales (himno, escudo y bandera) y comprende su significado e historia.',
        color: 'bg-green-600 hover:bg-green-700'
      },
      {
        id: 10,
        title: '🌳 Árbol de Decisiones',
        content: 'Derecho a la protección',
        pda: 'Identifica situaciones de riesgo (maltrato, abuso, bullying) y conoce las instancias para solicitar ayuda.',
        color: 'bg-pink-500 hover:bg-pink-600'
      }
    ];

    function renderMainMenu() {
      const grid = document.getElementById('games-grid');
      grid.innerHTML = games.map(game => `
        <button onclick="loadGame(${game.id})" class="game-btn ${game.color} text-white rounded-2xl p-4 text-left">
          <div class="flex flex-col h-full">
            <h3 class="text-lg md:text-xl font-bold mb-2">${game.title}</h3>
            <div class="bg-white/20 rounded-xl p-3 mb-3 flex-grow">
              <p class="text-sm font-semibold text-white/90">📖 Contenido:</p>
              <p class="text-sm text-white">${game.content}</p>
            </div>
            <div class="pda-badge rounded-xl p-3">
              <p class="text-xs font-bold text-amber-800">📝 PDA:</p>
              <p class="text-xs text-amber-900 leading-relaxed">${game.pda}</p>
            </div>
          </div>
        </button>
      `).join('');
    }

    function goBack() {
      document.getElementById('main-menu').classList.remove('hidden');
      document.getElementById('game-container').classList.add('hidden');
    }

    function loadGame(gameId) {
      document.getElementById('main-menu').classList.add('hidden');
      document.getElementById('game-container').classList.remove('hidden');
      
      const game = games.find(g => g.id === gameId);
      const gameContent = document.getElementById('game-content');
      
      gameContent.innerHTML = getGameHTML(gameId, game);
      initializeGame(gameId);
    }

    function getGameHTML(gameId, game) {
      const header = `
        <div class="mb-4">
          <h2 class="text-xl md:text-2xl font-bold text-sky-700 mb-2">${game.title}</h2>
          <div class="bg-sky-100 rounded-xl p-3 mb-3">
            <p class="text-sm font-semibold text-sky-700">📖 Contenido: ${game.content}</p>
          </div>
          <div class="pda-badge rounded-xl p-3">
            <p class="text-xs font-bold text-amber-800">📝 PDA: ${game.pda}</p>
          </div>
        </div>
        <hr class="border-sky-200 my-4">
      `;

      switch(gameId) {
        case 1: return header + getGame1HTML();
        case 2: return header + getGame2HTML();
        case 3: return header + getGame3HTML();
        case 4: return header + getGame4HTML();
        case 5: return header + getGame5HTML();
        case 6: return header + getGame6HTML();
        case 7: return header + getGame7HTML();
        case 8: return header + getGame8HTML();
        case 9: return header + getGame9HTML();
        case 10: return header + getGame10HTML();
        default: return header + '<p>Juego en desarrollo...</p>';
      }
    }

    // Game 1: Búsqueda del Tesoro Cartográfico
    function getGame1HTML() {
      return `
        <div class="text-center mb-4">
          <p class="text-sky-600 font-semibold mb-2">🧭 Usa la brújula para colocar los lugares en el mapa</p>
          <div class="flex justify-center gap-4 mb-4">
            <div class="bg-sky-100 rounded-xl p-3">
              <p class="font-bold text-sky-700">🧭 Brújula</p>
              <div class="grid grid-cols-3 gap-1 text-center mt-2">
                <div></div>
                <div class="bg-red-400 text-white rounded px-2 py-1 text-xs font-bold">N</div>
                <div></div>
                <div class="bg-yellow-400 text-white rounded px-2 py-1 text-xs font-bold">O</div>
                <div class="bg-gray-300 rounded px-2 py-1 text-xs">•</div>
                <div class="bg-green-400 text-white rounded px-2 py-1 text-xs font-bold">E</div>
                <div></div>
                <div class="bg-blue-400 text-white rounded px-2 py-1 text-xs font-bold">S</div>
                <div></div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="flex flex-wrap justify-center gap-2 mb-4" id="icons-container">
          <button onclick="selectIcon('🏫', 'Escuela')" class="draggable bg-white border-2 border-sky-300 rounded-xl px-4 py-2 hover:bg-sky-50" data-icon="🏫">🏫 Escuela</button>
          <button onclick="selectIcon('🌳', 'Parque')" class="draggable bg-white border-2 border-sky-300 rounded-xl px-4 py-2 hover:bg-sky-50" data-icon="🌳">🌳 Parque</button>
          <button onclick="selectIcon('🌊', 'Río')" class="draggable bg-white border-2 border-sky-300 rounded-xl px-4 py-2 hover:bg-sky-50" data-icon="🌊">🌊 Río</button>
          <button onclick="selectIcon('🏠', 'Casa')" class="draggable bg-white border-2 border-sky-300 rounded-xl px-4 py-2 hover:bg-sky-50" data-icon="🏠">🏠 Casa</button>
        </div>
        
        <p id="selected-icon" class="text-center text-sky-600 font-semibold mb-2">Selecciona un lugar</p>
        
        <div class="bg-green-100 rounded-xl p-4 relative" style="min-height: 250px;">
          <div class="absolute top-2 left-1/2 transform -translate-x-1/2 text-red-500 font-bold">Norte ⬆️</div>
          <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 text-blue-500 font-bold">Sur ⬇️</div>
          <div class="absolute left-2 top-1/2 transform -translate-y-1/2 text-yellow-600 font-bold">Oeste ⬅️</div>
          <div class="absolute right-2 top-1/2 transform -translate-y-1/2 text-green-600 font-bold">Este ➡️</div>
          
          <div class="grid grid-cols-3 grid-rows-3 gap-2 h-48 mt-6 mb-6">
            <div onclick="placeIcon(0)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="NO"></div>
            <div onclick="placeIcon(1)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="N"></div>
            <div onclick="placeIcon(2)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="NE"></div>
            <div onclick="placeIcon(3)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="O"></div>
            <div onclick="placeIcon(4)" class="drop-zone bg-yellow-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-solid border-yellow-500 cursor-pointer hover:bg-yellow-200" data-pos="Centro">📍</div>
            <div onclick="placeIcon(5)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="E"></div>
            <div onclick="placeIcon(6)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="SO"></div>
            <div onclick="placeIcon(7)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="S"></div>
            <div onclick="placeIcon(8)" class="drop-zone bg-green-200/50 rounded-lg flex items-center justify-center text-2xl border-2 border-dashed border-green-400 cursor-pointer hover:bg-green-200" data-pos="SE"></div>
          </div>
        </div>
        
        <div id="game1-feedback" class="mt-4 text-center hidden">
          <p class="text-lg font-bold text-green-600">🎉 ¡Excelente trabajo creando tu mapa!</p>
        </div>
        
        <button onclick="resetGame1()" class="mt-4 w-full bg-sky-500 hover:bg-sky-600 text-white rounded-xl py-2 font-bold">🔄 Reiniciar Mapa</button>
      `;
    }

    let selectedIcon = null;
    let selectedName = null;
    let placedIcons = 0;

    function selectIcon(icon, name) {
      selectedIcon = icon;
      selectedName = name;
      document.getElementById('selected-icon').textContent = `Seleccionado: ${icon} ${name} - ¡Haz clic en el mapa!`;
      document.getElementById('selected-icon').classList.add('text-green-600');
    }

    function placeIcon(position) {
      if (!selectedIcon || position === 4) return;
      
      const zones = document.querySelectorAll('.drop-zone');
      if (zones[position].textContent && zones[position].textContent !== '') {
        zones[position].textContent = '';
        placedIcons--;
      }
      
      zones[position].textContent = selectedIcon;
      zones[position].classList.add('bg-white');
      placedIcons++;
      
      if (placedIcons >= 4) {
        document.getElementById('game1-feedback').classList.remove('hidden');
      }
    }

    function resetGame1() {
      const zones = document.querySelectorAll('.drop-zone');
      zones.forEach((zone, i) => {
        if (i !== 4) {
          zone.textContent = '';
          zone.classList.remove('bg-white');
        }
      });
      placedIcons = 0;
      selectedIcon = null;
      document.getElementById('selected-icon').textContent = 'Selecciona un lugar';
      document.getElementById('selected-icon').classList.remove('text-green-600');
      document.getElementById('game1-feedback').classList.add('hidden');
    }

    // Game 2: Equilibrio Ambiental
    function getGame2HTML() {
      return `
        <div class="text-center">
          <p class="text-sky-600 font-semibold mb-4">💧 Administra el agua del río para los cultivos sin que se seque</p>
          
          <div class="flex justify-around items-end mb-6 bg-gradient-to-b from-sky-100 to-green-100 rounded-xl p-4" style="min-height: 200px;">
            <div class="text-center">
              <p class="font-bold text-blue-600 mb-2">🌊 Río</p>
              <div class="w-20 bg-gray-200 rounded-lg overflow-hidden" style="height: 150px;">
                <div id="river-level" class="bg-blue-400 w-full transition-all duration-500" style="height: 100%;"></div>
              </div>
              <p id="river-percent" class="font-bold text-blue-600 mt-2">100%</p>
            </div>
            
            <div class="text-center">
              <p class="font-bold text-green-600 mb-2">🌾 Cultivos</p>
              <div id="crops-display" class="text-6xl">🌱</div>
              <p id="crops-status" class="font-semibold text-green-600">Necesitan agua</p>
            </div>
            
            <div class="text-center">
              <p class="font-bold text-amber-600 mb-2">☀️ Día</p>
              <p id="day-counter" class="text-3xl font-bold text-amber-600">1</p>
            </div>
          </div>
          
          <p class="text-sky-700 font-semibold mb-2">¿Cuánta agua usarás hoy?</p>
          
          <div class="flex justify-center gap-2 flex-wrap mb-4">
            <button onclick="useWater(10)" class="bg-blue-300 hover:bg-blue-400 text-blue-800 rounded-xl px-4 py-2 font-bold">💧 Poca (10%)</button>
            <button onclick="useWater(25)" class="bg-blue-400 hover:bg-blue-500 text-white rounded-xl px-4 py-2 font-bold">💧💧 Media (25%)</button>
            <button onclick="useWater(40)" class="bg-blue-500 hover:bg-blue-600 text-white rounded-xl px-4 py-2 font-bold">💧💧💧 Mucha (40%)</button>
          </div>
          
          <div id="game2-message" class="p-4 rounded-xl bg-sky-100 text-sky-700">
            <p>🤔 Piensa bien: si usas mucha agua los cultivos crecen rápido, pero el río puede secarse.</p>
          </div>
          
          <button onclick="resetGame2()" class="mt-4 w-full bg-sky-500 hover:bg-sky-600 text-white rounded-xl py-2 font-bold">🔄 Jugar de Nuevo</button>
        </div>
      `;
    }

    let riverLevel = 100;
    let cropGrowth = 0;
    let day = 1;

    function useWater(amount) {
      riverLevel -= amount;
      cropGrowth += amount * 1.5;
      day++;
      
      // Rain chance
      if (Math.random() > 0.6) {
        riverLevel = Math.min(100, riverLevel + 15);
        document.getElementById('game2-message').innerHTML = '<p>🌧️ ¡Llovió! El río recuperó algo de agua.</p>';
      }
      
      riverLevel = Math.max(0, riverLevel);
      
      document.getElementById('river-level').style.height = riverLevel + '%';
      document.getElementById('river-percent').textContent = riverLevel + '%';
      document.getElementById('day-counter').textContent = day;
      
      // Update crops
      let cropsEmoji = '🌱';
      let cropsStatus = 'Creciendo...';
      
      if (cropGrowth >= 100) {
        cropsEmoji = '🌾🌾🌾';
        cropsStatus = '¡Cosecha lista!';
      } else if (cropGrowth >= 60) {
        cropsEmoji = '🌿🌿';
        cropsStatus = 'Casi listos';
      } else if (cropGrowth >= 30) {
        cropsEmoji = '🌱🌱';
        cropsStatus = 'Creciendo bien';
      }
      
      document.getElementById('crops-display').textContent = cropsEmoji;
      document.getElementById('crops-status').textContent = cropsStatus;
      
      // Check win/lose
      if (riverLevel <= 0) {
        document.getElementById('game2-message').innerHTML = '<p class="text-red-600 font-bold">😢 ¡Oh no! El río se secó. Los animales y plantas del ecosistema sufren. Debemos cuidar mejor el agua.</p>';
      } else if (cropGrowth >= 100 && riverLevel > 20) {
        document.getElementById('game2-message').innerHTML = '<p class="text-green-600 font-bold">🎉 ¡Felicidades! Lograste una cosecha exitosa manteniendo el río saludable. ¡Eres un guardián del equilibrio!</p>';
      }
    }

    function resetGame2() {
      riverLevel = 100;
      cropGrowth = 0;
      day = 1;
      document.getElementById('river-level').style.height = '100%';
      document.getElementById('river-percent').textContent = '100%';
      document.getElementById('day-counter').textContent = '1';
      document.getElementById('crops-display').textContent = '🌱';
      document.getElementById('crops-status').textContent = 'Necesitan agua';
      document.getElementById('game2-message').innerHTML = '<p>🤔 Piensa bien: si usas mucha agua los cultivos crecen rápido, pero el río puede secarse.</p>';
    }

    // Game 3: Viaje con el Abuelo Sabio
    function getGame3HTML() {
      return `
        <div class="text-center">
          <div class="bg-amber-100 rounded-xl p-4 mb-4">
            <p class="text-4xl mb-2">👴🏽</p>
            <p id="abuelo-message" class="text-amber-800 font-semibold">"Bienvenido, pequeño guardián. Te enseñaré cómo nuestros ancestros recolectaban frutos sin dañar la naturaleza."</p>
          </div>
          
          <div class="bg-green-100 rounded-xl p-4 mb-4">
            <p class="text-green-700 font-bold mb-2">🌳 Árbol de Frutas</p>
            <div class="text-6xl mb-2" id="tree-display">🌳🍎🍎🍎</div>
            <p id="fruits-count" class="text-green-600">Frutas disponibles: 3</p>
          </div>
          
          <p class="text-sky-700 font-semibold mb-2">¿Qué herramienta usarás?</p>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
            <button onclick="chooseTool('canasta')" class="bg-amber-400 hover:bg-amber-500 text-white rounded-xl px-4 py-3 font-bold">
              🧺 Canasta tejida<br><span class="text-xs">Tradicional y cuidadosa</span>
            </button>
            <button onclick="chooseTool('vara')" class="bg-orange-400 hover:bg-orange-500 text-white rounded-xl px-4 py-3 font-bold">
              🪵 Vara larga<br><span class="text-xs">Alcanza sin subir</span>
            </button>
            <button onclick="chooseTool('manos')" class="bg-red-400 hover:bg-red-500 text-white rounded-xl px-4 py-3 font-bold">
              ✋ Sacudir ramas<br><span class="text-xs">Rápido pero brusco</span>
            </button>
          </div>
          
          <div id="game3-result" class="p-4 rounded-xl bg-sky-100">
            <p class="text-sky-700">Elige una herramienta para recolectar los frutos.</p>
          </div>
          
          <div id="game3-score" class="mt-4 flex justify-center gap-4">
            <div class="bg-green-100 rounded-xl px-4 py-2">
              <p class="text-green-700 font-bold">🍎 Frutas: <span id="collected-fruits">0</span></p>
            </div>
            <div class="bg-red-100 rounded-xl px-4 py-2">
              <p class="text-red-700 font-bold">🌿 Daño: <span id="tree-damage">0</span></p>
            </div>
          </div>

    const memoramaPairs = [
      { item: '🍫 Chocolate', origin: '🏛️ Azteca', id: 1 },
      { item: '🌽 Maíz', origin: '🌾 Maya', id: 2 },
      { item: '🎸 Son Jarocho', origin: '🌍 Afromexicano', id: 3 },
      { item: '🥑 Guacamole', origin: '🏺 Prehispánico', id: 4 },
      { item: '💀 Día de Muertos', origin: '⚱️ Mexica', id: 5 },
      { item: '🎭 Piñata', origin: '🇨🇳 China/España', id: 6 }
    ];

    let memoramaCards = [];
    let flippedCards = [];
    let matchedPairs = 0;

    function initMemorama() {
      const board = document.getElementById('memorama-board');
      memoramaCards = [];
      flippedCards = [];
      matchedPairs = 0;
      
      memoramaPairs.forEach(pair => {
        memoramaCards.push({ text: pair.item, id: pair.id, type: 'item' });
        memoramaCards.push({ text: pair.origin, id: pair.id, type: 'origin' });
      });
      
      memoramaCards.sort(() => Math.random() - 0.5);
      
      board.innerHTML = memoramaCards.map((card, index) => `
        <button onclick="flipCard(${index})" class="memo-card bg-purple-500 hover:bg-purple-600 text-white rounded-xl p-3 h-20 font-bold text-sm transition-all" data-index="${index}">
          ❓
        </button>
      `).join('');
      
      document.getElementById('pairs-found').textContent = '0';
      document.getElementById('memorama-message').innerHTML = '<p class="text-sky-700">Encuentra las parejas: elemento actual + su origen cultural</p>';
    }

    function flipCard(index) {
      const cards = document.querySelectorAll('.memo-card');
      const card = cards[index];
      
      if (card.classList.contains('matched') || flippedCards.includes(index) || flippedCards.length >= 2) return;
      
      card.textContent = memoramaCards[index].text;
      card.classList.remove('bg-purple-500', 'hover:bg-purple-600');
      card.classList.add('bg-white', 'text-purple-700');
      flippedCards.push(index);
      
      if (flippedCards.length === 2) {
        const [first, second] = flippedCards;
        
        if (memoramaCards[first].id === memoramaCards[second].id && memoramaCards[first].type !== memoramaCards[second].type) {
          cards[first].classList.add('matched', 'bg-green-200');
          cards[second].classList.add('matched', 'bg-green-200');
          matchedPairs++;
          document.getElementById('pairs-found').textContent = matchedPairs;
          flippedCards = [];
          
          if (matchedPairs >= 6) {
            document.getElementById('memorama-message').innerHTML = '<p class="text-green-600 font-bold">🎉 ¡Felicidades! Descubriste todas las aportaciones culturales de nuestros pueblos.</p>';
          }
        } else {
          setTimeout(() => {
            cards[first].textContent = '❓';
            cards[first].classList.remove('bg-white', 'text-purple-700');
            cards[first].classList.add('bg-purple-500', 'hover:bg-purple-600');
            cards[second].textContent = '❓';
            cards[second].classList.remove('bg-white', 'text-purple-700');
            cards[second].classList.add('bg-purple-500', 'hover:bg-purple-600');
            flippedCards = [];
          }, 1000);
        }
      }
    }

      initMemorama();
    }

    let escudoCount = 0;

    function addEscudoPart(part) {
      if (escudoParts[part].added) return;
      
      escudoParts[part].added = true;
      escudoCount++;
      
      document.getElementById('btn-' + part).classList.add('opacity-50');
      document.getElementById('btn-' + part).disabled = true;
      
      document.getElementById('escudo-info').innerHTML = `<p class="text-amber-800 font-semibold">${escudoParts[part].meaning}</p>`;
      
      let escudoEmoji = '';
      if (escudoParts.agua.added) escudoEmoji += '💧';
      if (escudoParts.nopal.added) escudoEmoji += '🌵';
      if (escudoParts.aguila.added) escudoEmoji += '🦅';
      if (escudoParts.serpiente.added) escudoEmoji += '🐍';
      if (escudoParts.ramas.added) escudoEmoji += '🌿';
      
      document.getElementById('escudo-progress').textContent = escudoEmoji || '⬜';
      document.getElementById('escudo-status').textContent = `Escudo: ${escudoCount}/5 partes`;
      
      if (escudoCount >= 5) {
        document.getElementById('escudo-progress').textContent = '🇲🇽';
        document.getElementById('escudo-info').innerHTML = '<p class="text-green-600 font-bold">🎉 ¡Felicidades! Has armado el Escudo Nacional de México. Ahora conoces el significado de cada uno de sus elementos sagrados.</p>';

    let currentScenario = 0;

    function initGame10() {
      currentScenario = 0;
      correctAnswers = 0;
      document.getElementById('correct-count').textContent = '0';

    function showScenario() {
      if (currentScenario >= scenarios.length) {
        showGame10Results();
        return;
      }
      
      const scenario = scenarios[currentScenario];
      document.getElementById('scenario-num').textContent = currentScenario + 1;
      document.getElementById('scenario-text').textContent = scenario.text;
      document.getElementById('game10-feedback').classList.add('hidden');
      
      const container = document.getElementById('options-container');
      container.innerHTML = scenario.options.map((opt, i) => `
        <button onclick="selectOption(${i})" class="option-btn bg-white border-2 border-purple-300 hover:border-purple-500 hover:bg-purple-50 rounded-xl p-3 font-semibold text-purple-700 text-left transition-all">
          ${opt.text}
        </button>
      `).join('');
    }

    function selectOption(index) {
      const scenario = scenarios[currentScenario];
      const option = scenario.options[index];
      const buttons = document.querySelectorAll('.option-btn');
      
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (scenario.options[i].correct) {
          btn.classList.add('bg-green-200', 'border-green-500');
        } else if (i === index) {
          btn.classList.add('bg-red-200', 'border-red-500');
        }
      });
      
      if (option.correct) {
        correctAnswers++;
        document.getElementById('correct-count').textContent = correctAnswers;
      }
      
      document.getElementById('game10-feedback').classList.remove('hidden');
      document.getElementById('feedback-text').innerHTML = option.correct 
        ? `<span class="text-green-600 font-bold">✅ ${scenario.feedback}</span>`
        : `<span class="text-red-600 font-bold">❌ Esa no es la mejor opción.</span> ${scenario.feedback}`;
      
      setTimeout(() => {
        currentScenario++;
        showScenario();
      }, 4000);
    }
