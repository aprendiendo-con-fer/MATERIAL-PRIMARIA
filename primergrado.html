<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juegos Educativos - Primer Grado</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;family=Fredoka:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    .game-title { font-family: 'Fredoka', sans-serif; }
    .main-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: white;
      text-shadow: 
        -3px -3px 0 #000,
        3px -3px 0 #000,
        -3px 3px 0 #000,
        3px 3px 0 #000,
        -3px 0 0 #000,
        3px 0 0 #000,
        0 -3px 0 #000,
        0 3px 0 #000,
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
      letter-spacing: 2px;
    }
    @media (min-width: 768px) {
      .main-title { font-size: 4.5rem; }
    }
    
    .photon-btn {
      border-radius: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 6px 0 rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.1);
    }
    .photon-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 0 rgba(0,0,0,0.15), 0 15px 30px rgba(0,0,0,0.15);
    }
    .photon-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .game-card {
      border-radius: 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,255,255,0.6); }
    }
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    @keyframes celebrate {
      0% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.2) rotate(-5deg); }
      50% { transform: scale(1.2) rotate(5deg); }
      75% { transform: scale(1.2) rotate(-5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    .floating { animation: float 3s ease-in-out infinite; }
    .bounce-in { animation: bounce-in 0.5s ease-out forwards; }
    .shake { animation: shake 0.5s ease-in-out; }
    .celebrate { animation: celebrate 0.6s ease-in-out; }
    
    .bubble {
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }
    .bubble:hover {
      transform: scale(1.15);
    }
    .bubble.popped {
      transform: scale(0);
      opacity: 0;
    }
    
    .draggable {
      cursor: grab;
      user-select: none;
    }
    .draggable:active {
      cursor: grabbing;
    }
    
    .drop-zone {
      border: 3px dashed rgba(255,255,255,0.5);
      border-radius: 16px;
      transition: all 0.3s;
    }
    .drop-zone.highlight {
      border-color: #FFD700;
      background: rgba(255,215,0,0.2);
    }
    
    .progress-bar {
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(255,255,255,0.3);
    }
    .progress-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease-out;
    }
    
    .star {
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255,215,0,0.5);
    }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto" style="background: linear-gradient(180deg, #E8F4FC 0%, #D4ECFB 50%, #C5E5FA 100%);">

    <header class="text-center mb-8">

     <p class="text-xl md:text-2xl text-gray-600 font-semibold">Primer Grado de Primaria</p>

    </header>
    <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 max-w-7xl mx-auto"><!-- Los juegos se generan dinámicamente -->

    </footer>
   </div><!-- Contenedor de Juegos -->
   <div id="game-container" class="hidden min-h-full"><!-- El juego activo se renderiza aquí -->
   </div>
  </div>

    let config = { ...defaultConfig };

      {

      },
      {
        id: 18,
        title: "Termómetro Veloz",
        subtitle: "Lee Rápido",
        objective: "Practicar trabalenguas",
        icon: "🌡️",
        color: "from-orange-400 to-red-600",
        skill: "Trabalenguas"
      },
      {
        id: 19,
        title: "Editor de Noticias",
        subtitle: "Arma el Periódico",
        objective: "Relacionar fotos con titulares",
        icon: "📰",
        color: "from-teal-400 to-cyan-600",
        skill: "La noticia"
      },
      {
        id: 20,
        title: "Escritor Galáctico",
        subtitle: "Salva la Tierra",
        objective: "Escribir palabras correctamente",
        icon: "☄️",
        color: "from-purple-600 to-blue-700",
        skill: "Dictado"
      }
    ];
    
    // Estado del juego actual
    let currentGame = null;
    let gameState = {};
    
    // Renderizar menú de juegos
    function renderGamesMenu() {
      const grid = document.getElementById('games-grid');
      grid.innerHTML = gamesData.map((game, index) => `
        <div class="game-card bg-gradient-to-br ${game.color} p-1 shadow-xl cursor-pointer bounce-in" 
             style="animation-delay: ${index * 0.05}s"
             onclick="startGame(${game.id})">
          <div class="bg-white/20 backdrop-blur-sm rounded-[20px] p-4 h-full">
            <div class="text-5xl mb-3 floating" style="animation-delay: ${index * 0.1}s">${game.icon}</div>
            <h3 class="game-title text-white text-xl font-bold drop-shadow-lg">${game.title}</h3>
            <p class="text-white/90 text-sm font-medium mb-2">${game.subtitle}</p>
            <div class="bg-white/30 rounded-xl px-3 py-2 mt-3">
              <p class="text-white text-xs font-semibold">🎯 ${game.objective}</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <span class="bg-white/40 text-white text-xs font-bold px-3 py-1 rounded-full">
                ${game.skill}
              </span>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // Iniciar un juego
    function startGame(gameId) {
      currentGame = gamesData.find(g => g.id === gameId);
      gameState = { score: 0, level: 1, lives: 3 };
      
      document.getElementById('main-menu').classList.add('hidden');
      document.getElementById('game-container').classList.remove('hidden');
      
      renderGame(gameId);
    }
    
    // Volver al menú
    function backToMenu() {
      document.getElementById('main-menu').classList.remove('hidden');
      document.getElementById('game-container').classList.add('hidden');
      currentGame = null;
    }
    
    // Renderizar cabecera del juego
    function renderGameHeader() {
      return `
        <div class="bg-white/80 backdrop-blur-md rounded-3xl p-4 mb-6 shadow-lg flex flex-wrap items-center justify-between gap-4">
          <button onclick="backToMenu()" class="photon-btn bg-gradient-to-r from-gray-400 to-gray-500 text-white font-bold px-6 py-3 flex items-center gap-2">
            ← Volver
          </button>
          <div class="flex items-center gap-4">
            <div class="text-4xl floating">${currentGame.icon}</div>
            <div>
              <h2 class="game-title text-2xl md:text-3xl font-bold text-gray-800">${currentGame.title}</h2>
              <p class="text-gray-600 font-medium">${currentGame.subtitle}</p>
            </div>
          </div>
          <div class="flex items-center gap-6">
            <div class="text-center">
              <p class="text-xs text-gray-500 font-semibold">PUNTOS</p>
              <p class="text-2xl font-bold text-purple-600" id="score-display">${gameState.score}</p>
            </div>
            <div class="text-center">
              <p class="text-xs text-gray-500 font-semibold">VIDAS</p>
              <p class="text-2xl" id="lives-display">${'❤️'.repeat(gameState.lives)}</p>
            </div>
          </div>
        </div>
      `;
    }
    
    // Actualizar puntuación
    function updateScore(points) {
      gameState.score += points;
      const scoreEl = document.getElementById('score-display');
      if (scoreEl) {
        scoreEl.textContent = gameState.score;
        scoreEl.classList.add('celebrate');
        setTimeout(() => scoreEl.classList.remove('celebrate'), 600);
      }
    }
    
    // Perder vida
    function loseLife() {
      gameState.lives--;
      const livesEl = document.getElementById('lives-display');
      if (livesEl) {
        livesEl.textContent = '❤️'.repeat(Math.max(0, gameState.lives));
        livesEl.classList.add('shake');
        setTimeout(() => livesEl.classList.remove('shake'), 500);
      }
      if (gameState.lives <= 0) {
        showGameOver();
      }
    }
    
    // Mostrar victoria
    function showVictory() {
      const container = document.getElementById('game-container');
      container.innerHTML = `
        <div class="min-h-full flex items-center justify-center p-8">
          <div class="bg-white/90 backdrop-blur-md rounded-3xl p-8 text-center max-w-md shadow-2xl">
            <div class="text-8xl mb-4">🏆</div>
            <h2 class="game-title text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-4">
              ¡FELICIDADES!
            </h2>
            <p class="text-xl text-gray-700 mb-2">Completaste el juego</p>
            <p class="text-3xl font-bold text-purple-600 mb-6">Puntos: ${gameState.score}</p>
            <div class="text-4xl mb-6 star">⭐⭐⭐</div>
            <button onclick="backToMenu()" class="photon-btn bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold px-8 py-4 text-xl">
              Jugar Otro 🎮
            </button>
          </div>
        </div>
      `;
    }
    
    // Mostrar game over
    function showGameOver() {
      const container = document.getElementById('game-container');
      container.innerHTML = `
        <div class="min-h-full flex items-center justify-center p-8">
          <div class="bg-white/90 backdrop-blur-md rounded-3xl p-8 text-center max-w-md shadow-2xl">
            <div class="text-8xl mb-4">😢</div>
            <h2 class="game-title text-4xl font-bold text-gray-700 mb-4">
              ¡Inténtalo de nuevo!
            </h2>
            <p class="text-xl text-gray-600 mb-2">Puntos obtenidos</p>
            <p class="text-3xl font-bold text-purple-600 mb-6">${gameState.score}</p>
            <div class="flex gap-4 justify-center flex-wrap">
              <button onclick="startGame(${currentGame.id})" class="photon-btn bg-gradient-to-r from-blue-400 to-cyan-500 text-white font-bold px-6 py-3">
                Reintentar 🔄
              </button>
              <button onclick="backToMenu()" class="photon-btn bg-gradient-to-r from-gray-400 to-gray-500 text-white font-bold px-6 py-3">
                Menú 🏠
              </button>
            </div>
          </div>
        </div>
      `;
    }
    
    // ===== JUEGO 1: PACO EL CHATO =====
    function renderGame1() {
      const signals = [
        { id: 1, emoji: '🚶', name: 'Cruce peatonal', correct: true },
        { id: 2, emoji: '🚫', name: 'No pasar', correct: false },
        { id: 3, emoji: '🟢', name: 'Semáforo verde', correct: true },
        { id: 4, emoji: '🔴', name: 'Semáforo rojo', correct: false },
        { id: 5, emoji: '⚠️', name: 'Precaución', correct: true },
        { id: 6, emoji: '🏠', name: '¡Casa de Paco!', correct: true, isHome: true }
      ];
      
      gameState.pacoPosition = 0;
      gameState.signals = signals;
      gameState.correctPath = [1, 3, 5, 6];
      gameState.currentStep = 0;
      
      const container = document.getElementById('game-container');
      container.innerHTML = `
        <div class="min-h-full p-4 md:p-8">
          ${renderGameHeader()}
          <div class="bg-white/70 backdrop-blur-md rounded-3xl p-6 shadow-xl">
            <div class="text-center mb-6">
              <p class="text-lg text-gray-700 font-semibold">
                🎯 Ayuda a Paco a llegar a casa eligiendo las señales correctas
              </p>
              <p class="text-gray-500 mt-2">Elige señales que sean seguras para cruzar</p>
            </div>
            
            <div class="flex justify-center mb-8">
              <div class="relative">
                <div class="text-8xl floating" id="paco-character">🧒</div>
                <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-xs font-bold px-3 py-1 rounded-full">
                  Paco
                </div>
              </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 max-w-2xl mx-auto" id="signals-grid">
              ${signals.map(signal => `
                <button onclick="selectSignal(${signal.id})" 
                        id="signal-${signal.id}"
                        class="photon-btn bg-gradient-to-br from-white to-gray-100 p-6 flex flex-col items-center gap-2 border-4 border-transparent hover:border-blue-300 ${signal.isHome ? 'opacity-50 pointer-events-none' : ''}">
                  <span class="text-5xl">${signal.emoji}</span>
                  <span class="font-bold text-gray-700">${signal.name}</span>
                </button>
              `).join('')}
            </div>
            
            <div class="mt-6 max-w-md mx-auto">
              <p class="text-sm text-gray-500 text-center mb-2">Progreso hacia casa</p>
              <div class="progress-bar">
                <div class="progress-fill bg-gradient-to-r from-green-400 to-emerald-500" id="progress-fill" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function selectSignal(signalId) {
      const signal = gameState.signals.find(s => s.id === signalId);
      const btn = document.getElementById(`signal-${signalId}`);
      
      if (signal.correct) {
        btn.classList.add('border-green-500', 'bg-green-100');
        btn.classList.remove('hover:border-blue-300');
        btn.onclick = null;
        updateScore(10);
        
        gameState.currentStep++;
        const progress = (gameState.currentStep / gameState.correctPath.length) * 100;
        document.getElementById('progress-fill').style.width = `${progress}%`;
        
        if (signal.isHome) {
          document.getElementById('paco-character').textContent = '🏠🧒';
          setTimeout(showVictory, 1000);
        } else if (gameState.currentStep === gameState.correctPath.length - 1) {
          document.getElementById('signal-6').classList.remove('opacity-50', 'pointer-events-none');
        }
      } else {
        btn.classList.add('shake', 'border-red-500');
        setTimeout(() => btn.classList.remove('shake'), 500);
        loseLife();
      }
    }
    
    // ===== JUEGO 2: NOMBRE PROPIO =====
    function renderGame2() {
      gameState.letters = [];
      gameState.colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8'];
      
      const container = document.getElementById('game-container');
      container.innerHTML = `
        <div class="min-h-full p-4 md:p-8">
          ${renderGameHeader()}
          <div class="bg-white/70 backdrop-blur-md rounded-3xl p-6 shadow-xl">
            <div class="text-center mb-6">
              <p class="text-lg text-gray-700 font-semibold">
                🎯 Escribe tu nombre y crea un logo increíble
              </p>
            </div>
            
            <div class="max-w-md mx-auto mb-6">
              <input type="text" id="name-input" 
                     placeholder="Escribe tu nombre aquí..."
                     maxlength="12"
                     class="w-full text-center text-2xl font-bold p-4 rounded-2xl border-4 border-purple-300 focus:border-purple-500 focus:outline-none"

    function updateLogoPreview() {
      const name = document.getElementById('name-input').value.toUpperCase();
      const preview = document.getElementById('logo-preview');
      
      if (!name) {
        preview.innerHTML = '<p class="text-gray-400 text-xl">Tu logo aparecerá aquí ✨</p>';
        return;
      }
      
      const letters = name.split('').map((letter, i) => {
        const color = gameState.colors[i % gameState.colors.length];
        let style = `color: ${color}; font-size: 3.5rem; font-weight: 900; text-shadow: 3px 3px 0 rgba(0,0,0,0.2);`;
        
        if (gameState.logoStyle === 'bounce') {
          style += `animation: float 1s ease-in-out infinite; animation-delay: ${i * 0.1}s;`;
        } else if (gameState.logoStyle === 'glow') {
          style += `text-shadow: 0 0 20px ${color}, 0 0 40px ${color};`;
        } else if (gameState.logoStyle === 'shadow') {
          style += `text-shadow: 4px 4px 0 #333, 6px 6px 0 #666;`;
        }
        
        return `<span class="game-title inline-block" style="${style}">${letter}</span>`;
      }).join('');
      
      preview.innerHTML = letters;
    }
    
    function changeLogoStyle(style) {
      gameState.logoStyle = style;
      updateLogoPreview();
      updateScore(5);
    }
    
    function saveLogo() {
      const name = document.getElementById('name-input').value;
      if (name.length >= 2) {
        updateScore(50);
        showVictory();
      }
    }

    function checkCount() {
      const challenge = gameState.challenges[gameState.current];
      
      if (gameState.userAnswer === challenge.answer) {
        updateScore(20);
        gameState.current++;
        gameState.userAnswer = '';
        
        if (gameState.current >= gameState.challenges.length) {
          showVictory();

        }
      } else {
        loseLife();
        document.getElementById('count-input').classList.add('shake', 'border-red-500');
        setTimeout(() => {
          const input = document.getElementById('count-input');
          if (input) {
            input.classList.remove('shake', 'border-red-500');
          }
        }, 500);
      }
    }
    
    function skipCount() {
      gameState.current++;
      gameState.userAnswer = '';
      
      if (gameState.current >= gameState.challenges.length) {
        showVictory();
      } else {
        renderCountingGame(document.getElementById('game-container'));

    }

    function checkRhyme(word) {
      const current = gameState.rhymes[gameState.currentRhyme];
      
      if (word === current.match) {
        updateScore(20);
        gameState.currentRhyme++;
        
        if (gameState.currentRhyme >= gameState.rhymes.length) {
          showVictory();

          gameState.options = generateRhymeOptions(gameState.rhymes[gameState.currentRhyme]);

      const storyName = 'Caperucita Roja';

      const shuffled = [...originalOrder].sort(() => Math.random() - 0.5);
      
      gameState.story = storyName;
      gameState.scenes = shuffled;
      gameState.correctOrder = originalOrder.map(s => s.id);
      gameState.userOrder = [];

      container.innerHTML = `

            </div>
            
            <div class="mb-8">
              <h3 class="text-center font-bold text-gray-600 mb-4">📽️ Tu película:</h3>
              <div id="movie-timeline" class="flex gap-2 justify-center flex-wrap min-h-24 p-4 bg-white/50 rounded-2xl">
                ${gameState.userOrder.length === 0 ? '<p class="text-gray-400 self-center">Haz clic en las escenas...</p>' : ''}
              </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="scenes-container">
              ${shuffled.map(scene => `
                <button onclick="addScene(${scene.id})" 
                        id="scene-${scene.id}"
                        class="photon-btn bg-white p-4 flex items-center gap-4 text-left">
                  <span class="text-5xl">${scene.emoji}</span>
                  <span class="font-medium text-gray-700">${scene.text}</span>
                </button>
              `).join('')}
            </div>
            
            <div class="text-center mt-6">
              <button onclick="checkStoryOrder()" class="photon-btn bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold px-8 py-4 text-xl">
                ¡Verificar Película! 🎬
              </button>
            </div>
          </div>
        </div>
      `;
    }
    
    function addScene(sceneId) {
      if (gameState.userOrder.includes(sceneId)) return;
      
      gameState.userOrder.push(sceneId);
      const scene = gameState.scenes.find(s => s.id === sceneId);
      
      document.getElementById(`scene-${sceneId}`).classList.add('opacity-50', 'pointer-events-none');
      
      const timeline = document.getElementById('movie-timeline');
      if (gameState.userOrder.length === 1) {
        timeline.innerHTML = '';
      }
      
      const sceneEl = document.createElement('div');
      sceneEl.className = 'bg-amber-400 rounded-xl p-3 text-center bounce-in';
      sceneEl.innerHTML = `
        <span class="text-3xl block">${scene.emoji}</span>
        <span class="text-xs font-bold text-white">${gameState.userOrder.length}</span>
      `;
      timeline.appendChild(sceneEl);
    }
    
    function checkStoryOrder() {
      if (gameState.userOrder.length !== gameState.correctOrder.length) {
        document.getElementById('movie-timeline').classList.add('shake');
        setTimeout(() => document.getElementById('movie-timeline').classList.remove('shake'), 500);
        return;
      }
      
      const isCorrect = gameState.userOrder.every((id, i) => id === gameState.correctOrder[i]);
      
      if (isCorrect) {
        updateScore(50);
        showVictory();
      } else {
        loseLife();
        // Reiniciar
        gameState.userOrder = [];
        renderGame6();
      }
    }

    function checkAntonym(answer) {
      const pair = gameState.antonyms[gameState.current];
      const correctAnswer = gameState.showingFirst ? pair.word2 : pair.word1;

        updateScore(20);
