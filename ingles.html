      {text:'There is a beautiful ___ after the rain.', answer:'Rainbow', opts:['Rainbow','Storm','Fog']},
      {text:'___ comes after spring.', answer:'Summer', opts:['Winter','Summer','Autumn']},
      {text:'___ is when the leaves fall.', answer:'Autumn', opts:['Spring','Autumn','Winter']},
      {text:'I see ___ before the sun rises.', answer:'Fog', opts:['Lightning','Fog','Thunder']},
      {text:'The weather is very ___ today.', answer:'Hot', opts:['Cold','Hot','Windy']}
    ]}
];

let currentCat = null;
let phase = 'home'; // home, learn, quiz
let qIdx = 0;
let score = 0;
let answered = false;
let badges = JSON.parse(localStorage.getItem('englishGameBadges')) || {};
let categoryStats = JSON.parse(localStorage.getItem('englishGameStats')) || {};

const content = document.getElementById('content');
const btnHome = document.getElementById('btn-home');

function goHome() {
  phase = 'home';
  currentCat = null;
  btnHome.classList.add('hidden');
  renderHome();
}

function renderHome() {
  let html = `<div class="max-w-4xl mx-auto anim-pop">
    <div class="text-center mb-8">
      <p class="text-5xl mb-2">🎓</p>
      <h2 class="text-3xl font-900 text-gray-800 mb-2">¡Aprende Inglés Jugando!</h2>
      <p class="text-gray-500 mb-4">Elige una categoría para comenzar</p>
      <div id="total-badges" class="flex flex-wrap justify-center gap-2 mb-4"></div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3" id="categories"></div>
  </div>`;
  content.innerHTML = html;
  
  // Render total badges
  let totalBadgeHtml = '';
  const allBadges = [];
  Object.values(badges).forEach(b => allBadges.push(...b));
  const uniqueBadges = [...new Set(allBadges)];
  if (uniqueBadges.length > 0) {
    totalBadgeHtml = `<div class="text-sm font-700 px-3 py-2 rounded-full bg-yellow-50 border border-yellow-200">
      🎖️ ${uniqueBadges.length} Insignias Desbloqueadas
    </div>`;
  }
  document.getElementById('total-badges').innerHTML = totalBadgeHtml;
  
  // Render category buttons with badges
  let catHtml = '';
  CATEGORIES.forEach(c => {
    const hasBadges = badges[c.id] && badges[c.id].length > 0;
    const badgeEmojis = hasBadges ? badges[c.id].slice(0, 2).map(b => {
      const icons = { 'perfect': '⭐', 'master': '🏆', 'beginner': '🌿', 'dedicated': '💪', 'collector': '🎖️', 'speedster': '⚡' };
      return icons[b] || '🎖️';
    }).join('') : '';
    
    catHtml += `<button onclick="selectCat('${c.id}')" class="pill rounded-2xl p-4 flex flex-col items-center gap-2 border-2 border-gray-100 bg-white cursor-pointer relative" style="transition:all .2s">
      <span class="text-3xl">${c.emoji}</span>
      <span class="text-xs font-700 text-gray-700 text-center leading-tight">${c.name}</span>
      <span class="text-[10px] font-600 px-2 py-0.5 rounded-full text-white" style="background:${c.color}">${c.words.length} palabras</span>
      ${hasBadges ? `<span class="absolute top-1 right-1 text-lg">${badgeEmojis}</span>` : ''}
    </button>`;
  });
  document.getElementById('categories').innerHTML = catHtml;
}

function selectCat(id) {
  currentCat = CATEGORIES.find(c => c.id === id);
  phase = 'learn';
  btnHome.classList.remove('hidden');
  renderLearn();
}

function renderLearn() {
  let html = `<div class="max-w-2xl mx-auto anim-pop">
    <div class="text-center mb-5">
      <span class="text-4xl">${currentCat.emoji}</span>
      <h2 class="text-xl font-900 mt-1">${currentCat.name}</h2>
      <p class="text-gray-400 text-sm">📖 Aprende el vocabulario</p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">`;
  currentCat.words.forEach(w => {
    html += `<div class="card-flip rounded-xl p-4 text-center border-2" style="border-color:${currentCat.color}20;background:${currentCat.color}08">
      <div class="text-3xl mb-1">${w.em}</div>
      <div class="text-lg font-800" style="color:${currentCat.color}">${w.en}</div>
      <div class="text-sm text-gray-500">${w.es}</div>
    </div>`;
  });
  html += `</div>
    <div class="text-center">
      <button onclick="startQuiz()" class="pill text-white font-800 px-8 py-3 rounded-full text-lg shadow-lg" style="background:${currentCat.color}">
        ¡Practicar con Frases! 🚀
      </button>
    </div>
  </div>`;
  content.innerHTML = html;
}

function startQuiz() {
  phase = 'quiz';
  qIdx = 0;
  score = 0;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const s = currentCat.sentences[qIdx];
  const opts = shuffle([...s.opts]);
  let html = `<div class="max-w-lg mx-auto anim-pop">
    <div class="flex items-center justify-between mb-4">
      <span class="text-sm font-700 text-gray-400">${qIdx+1} / ${currentCat.sentences.length}</span>
      <span class="text-sm font-800 px-3 py-1 rounded-full text-white" style="background:${currentCat.color}">⭐ ${score}</span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-2 mb-6"><div class="h-2 rounded-full" style="width:${(qIdx/currentCat.sentences.length)*100}%;background:${currentCat.color}"></div></div>
    <div class="bg-gray-50 rounded-2xl p-6 text-center mb-6 border border-gray-100">
      <p class="text-xl font-800 text-gray-800 leading-relaxed">${s.text.replace('___', `<span class="px-3 py-1 rounded-lg inline-block" style="background:${currentCat.color}20;color:${currentCat.color};border:2px dashed ${currentCat.color}">???</span>`)}</p>
    </div>
    <div class="flex flex-col gap-3" id="opts">`;
  opts.forEach((o,i) => {
    html += `<button id="opt${i}" onclick="checkAnswer('${o}',${i})" class="pill w-full py-3 px-5 rounded-xl text-left font-700 text-lg border-2 border-gray-200 bg-white flex items-center gap-3">
      <span class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-800 text-white" style="background:${currentCat.color}">${String.fromCharCode(65+i)}</span>
      ${o}
    </button>`;
  });
  html += `</div></div>`;
  content.innerHTML = html;
}

function checkAnswer(chosen, idx) {
  if (answered) return;
  answered = true;
  const s = currentCat.sentences[qIdx];
  const correct = chosen === s.answer;
  if (correct) score++;

  // Highlight buttons
  const opts = document.getElementById('opts').children;
  for (let i = 0; i < opts.length; i++) {
    const btn = opts[i];
    const val = btn.textContent.trim().slice(1);
    if (btn.textContent.includes(s.answer)) {
      btn.style.borderColor = '#10AC84';
      btn.style.background = '#10AC8415';
    } else if (i === idx && !correct) {
      btn.classList.add('shake');
      btn.style.borderColor = '#EE5A24';
      btn.style.background = '#EE5A2415';
    }
    btn.style.pointerEvents = 'none';
  }

  setTimeout(() => {
    if (qIdx < currentCat.sentences.length - 1) {
      qIdx++;
      renderQuestion();
    } else {
      renderResults();
    }
  }, 1200);
}

function renderResults() {
  const total = currentCat.sentences.length;
  const pct = Math.round((score / total) * 100);
  const msg = pct === 100 ? '🏆 ¡Perfecto!' : pct >= 60 ? '👏 ¡Muy bien!' : '💪 ¡Sigue practicando!';
  let stars = pct === 100 ? '⭐⭐⭐' : pct >= 60 ? '⭐⭐' : '⭐';
  
  const newBadges = checkAndAwardBadges(currentCat.id, score, total);
  
  let badgesHtml = '';
  if (newBadges.length > 0) {
    badgesHtml = `<div class="mt-6 p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
      <p class="text-center font-800 text-yellow-800 mb-3">🎉 ¡NUEVAS INSIGNIAS DESBLOQUEADAS!</p>
      <div class="flex flex-wrap justify-center gap-3">`;
    newBadges.forEach(b => {
      badgesHtml += `<div class="flex flex-col items-center gap-1 p-2 bg-white rounded-xl">
        <span class="text-2xl">${b.emoji}</span>
        <span class="text-xs font-700 text-center">${b.name}</span>
      </div>`;
    });
    badgesHtml += `</div></div>`;
  }
  
  let html = `<div class="max-w-sm mx-auto text-center anim-pop">
    <div class="text-6xl mb-3 confetti">${pct === 100 ? '🎉' : '📊'}</div>
    <h2 class="text-2xl font-900 mb-1">${msg}</h2>
    <p class="text-3xl mb-2">${stars}</p>
    <div class="text-5xl font-900 mb-1" style="color:${currentCat.color}">${score}/${total}</div>
    <p class="text-gray-400 mb-6">${pct}% correcto</p>
    ${badgesHtml}
    <div class="flex flex-col gap-3 mt-6">
      <button onclick="startQuiz()" class="pill text-white font-800 px-6 py-3 rounded-full" style="background:${currentCat.color}">🔄 Intentar de Nuevo</button>
      <button onclick="selectCat('${currentCat.id}')" class="pill font-700 px-6 py-3 rounded-full border-2" style="border-color:${currentCat.color};color:${currentCat.color}">📖 Repasar Vocabulario</button>
      <button onclick="goHome()" class="pill font-700 px-6 py-3 rounded-full bg-gray-100 text-gray-600">🏠 Elegir otra categoría</button>
    </div>
  </div>`;
  content.innerHTML = html;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function saveBadges() {
  localStorage.setItem('englishGameBadges', JSON.stringify(badges));
}

function saveStats() {
  localStorage.setItem('englishGameStats', JSON.stringify(categoryStats));
}

function getBadgeColor(badgeType) {
  const colors = {
    'beginner': '#FFD700', 'master': '#FF69B4', 'perfect': '#FF1493',
    'speedster': '#00BFFF', 'dedicated': '#FF6347', 'collector': '#32CD32'
  };
  return colors[badgeType] || '#999';
}

function checkAndAwardBadges(catId, score, total) {
  if (!badges[catId]) badges[catId] = [];
  
  const pct = (score / total) * 100;
  const newBadges = [];
  
  if (pct === 100 && !badges[catId].includes('perfect')) {
    badges[catId].push('perfect');
    newBadges.push({ name: 'PERFECTO 🌟', emoji: '⭐', type: 'perfect' });
  } else if (pct >= 80 && !badges[catId].includes('master')) {
    badges[catId].push('master');
    newBadges.push({ name: 'MAESTRO 🎓', emoji: '🏆', type: 'master' });
  } else if (pct >= 60 && !badges[catId].includes('beginner')) {
    badges[catId].push('beginner');
    newBadges.push({ name: 'INICIADO 🌱', emoji: '🌿', type: 'beginner' });
  }
  
  if (!categoryStats[catId]) categoryStats[catId] = 0;
  categoryStats[catId]++;
  
  if (categoryStats[catId] >= 5 && !badges[catId].includes('dedicated')) {
    badges[catId].push('dedicated');
    newBadges.push({ name: 'DEDICADO 💪', emoji: '💪', type: 'dedicated' });
  }
  
  if (badges[catId].length >= 6 && !badges[catId].includes('collector')) {
    badges[catId].push('collector');
    newBadges.push({ name: 'COLECCIONISTA 🎖️', emoji: '🎖️', type: 'collector' });
  }
  
  saveBadges();
  saveStats();
  return newBadges;
}
