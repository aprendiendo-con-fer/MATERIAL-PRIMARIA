*{font-family:'Nunito',sans-serif}
.card-flip{transition:transform .4s}
.card-flip:hover{transform:scale(1.05)}
@keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
.anim-pop{animation:pop .3s ease-out}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .4s}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-60px) rotate(360deg)}}
.confetti{animation:confetti .8s ease-out forwards}
.pill{transition:all .2s}
.pill:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
</style>

   </header><!-- Main Content -->

      {text:'I smell with my ___.', answer:'Nose', opts:['Nose','Ear','Mouth']},

  { id:'colors', name:'Colores', emoji:'🎨', color:'#EE5A24',
    words:[
      {en:'Red',es:'Rojo',em:'🔴'},{en:'Blue',es:'Azul',em:'🔵'},{en:'Green',es:'Verde',em:'🟢'},
      {en:'Yellow',es:'Amarillo',em:'🟡'},{en:'Black',es:'Negro',em:'⚫'},{en:'White',es:'Blanco',em:'⚪'},
      {en:'Orange',es:'Naranja',em:'🟠'}

    sentences:[
      {text:'The sky is ___.', answer:'Blue', opts:['Red','Blue','Green']},

  { id:'animals', name:'Animales', emoji:'🐶', color:'#10AC84',
    words:[
      {en:'Dog',es:'Perro',em:'🐶'},{en:'Cat',es:'Gato',em:'🐱'},{en:'Bird',es:'Pájaro',em:'🐦'},
      {en:'Fish',es:'Pez',em:'🐟'},{en:'Horse',es:'Caballo',em:'🐴'},{en:'Rabbit',es:'Conejo',em:'🐰'},
      {en:'Bear',es:'Oso',em:'🐻'}
    ],
    sentences:[
      {text:'The ___ lives in water.', answer:'Fish', opts:['Dog','Fish','Bird']},

      {text:'I sleep in my ___.', answer:'Bedroom', opts:['Bathroom','Kitchen','Bedroom']},
      {text:'Open the ___ to enter the house.', answer:'Door', opts:['Window','Door','Table']},
      {text:'The flowers grow in the ___.', answer:'Garden', opts:['Garden','Kitchen','Bathroom']},

      {en:'Hot',es:'Caliente',em:'🥵'},{en:'Wind',es:'Viento',em:'💨'},{en:'Snow',es:'Nieve',em:'❄️'},
      {en:'Cloud',es:'Nube',em:'☁️'}
    ],
    sentences:[
      {text:'It is ___ today, I need sunglasses.', answer:'Sunny', opts:['Rainy','Sunny','Cold']},
      {text:'Take an umbrella, it is ___.', answer:'Rainy', opts:['Hot','Rainy','Sunny']},
      {text:'In winter it is very ___.', answer:'Cold', opts:['Hot','Sunny','Cold']},

let currentCat = null;
let phase = 'home'; // home, learn, quiz
let qIdx = 0;
let score = 0;
let answered = false;

const content = document.getElementById('content');
const btnHome = document.getElementById('btn-home');

function goHome() {
  phase = 'home';
  currentCat = null;
  btnHome.classList.add('hidden');
  renderHome();
}

function renderHome() {
  let html = `<div class="max-w-3xl mx-auto anim-pop">
    <div class="text-center mb-6">
      <p class="text-4xl mb-2">🎓</p>
      <h2 class="text-2xl font-900 text-gray-800">¡Aprende Inglés Jugando!</h2>
      <p class="text-gray-500 mt-1">Elige una categoría para comenzar</p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">`;
  CATEGORIES.forEach(c => {
    html += `<button onclick="selectCat('${c.id}')" class="pill rounded-2xl p-4 flex flex-col items-center gap-2 border-2 border-gray-100 bg-white cursor-pointer" style="transition:all .2s">
      <span class="text-3xl">${c.emoji}</span>
      <span class="text-xs font-700 text-gray-700 text-center leading-tight">${c.name}</span>
      <span class="text-[10px] font-600 px-2 py-0.5 rounded-full text-white" style="background:${c.color}">${c.words.length} palabras</span>
    </button>`;
  });
  html += `</div></div>`;
  content.innerHTML = html;
}

function selectCat(id) {
  currentCat = CATEGORIES.find(c => c.id === id);
  phase = 'learn';
  btnHome.classList.remove('hidden');
  renderLearn();
}

function renderLearn() {
  let html = `<div class="max-w-2xl mx-auto anim-pop">
    <div class="text-center mb-5">
      <span class="text-4xl">${currentCat.emoji}</span>
      <h2 class="text-xl font-900 mt-1">${currentCat.name}</h2>
      <p class="text-gray-400 text-sm">📖 Aprende el vocabulario</p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6">`;
  currentCat.words.forEach(w => {
    html += `<div class="card-flip rounded-xl p-4 text-center border-2" style="border-color:${currentCat.color}20;background:${currentCat.color}08">
      <div class="text-3xl mb-1">${w.em}</div>
      <div class="text-lg font-800" style="color:${currentCat.color}">${w.en}</div>
      <div class="text-sm text-gray-500">${w.es}</div>
    </div>`;
  });
  html += `</div>
    <div class="text-center">
      <button onclick="startQuiz()" class="pill text-white font-800 px-8 py-3 rounded-full text-lg shadow-lg" style="background:${currentCat.color}">
        ¡Practicar con Frases! 🚀
      </button>
    </div>
  </div>`;
  content.innerHTML = html;
}

function startQuiz() {
  phase = 'quiz';
  qIdx = 0;
  score = 0;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const s = currentCat.sentences[qIdx];
  const opts = shuffle([...s.opts]);
  let html = `<div class="max-w-lg mx-auto anim-pop">
    <div class="flex items-center justify-between mb-4">
      <span class="text-sm font-700 text-gray-400">${qIdx+1} / ${currentCat.sentences.length}</span>
      <span class="text-sm font-800 px-3 py-1 rounded-full text-white" style="background:${currentCat.color}">⭐ ${score}</span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-2 mb-6"><div class="h-2 rounded-full" style="width:${(qIdx/currentCat.sentences.length)*100}%;background:${currentCat.color}"></div></div>
    <div class="bg-gray-50 rounded-2xl p-6 text-center mb-6 border border-gray-100">
      <p class="text-xl font-800 text-gray-800 leading-relaxed">${s.text.replace('___', `<span class="px-3 py-1 rounded-lg inline-block" style="background:${currentCat.color}20;color:${currentCat.color};border:2px dashed ${currentCat.color}">???</span>`)}</p>
    </div>
    <div class="flex flex-col gap-3" id="opts">`;
  opts.forEach((o,i) => {
    html += `<button id="opt${i}" onclick="checkAnswer('${o}',${i})" class="pill w-full py-3 px-5 rounded-xl text-left font-700 text-lg border-2 border-gray-200 bg-white flex items-center gap-3">
      <span class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-800 text-white" style="background:${currentCat.color}">${String.fromCharCode(65+i)}</span>
      ${o}
    </button>`;
  });
  html += `</div></div>`;
  content.innerHTML = html;
}

function checkAnswer(chosen, idx) {
  if (answered) return;
  answered = true;
  const s = currentCat.sentences[qIdx];
  const correct = chosen === s.answer;
  if (correct) score++;

  // Highlight buttons
  const opts = document.getElementById('opts').children;
  for (let i = 0; i < opts.length; i++) {
    const btn = opts[i];
    const val = btn.textContent.trim().slice(1);
    if (btn.textContent.includes(s.answer)) {
      btn.style.borderColor = '#10AC84';
      btn.style.background = '#10AC8415';
    } else if (i === idx && !correct) {
      btn.classList.add('shake');
      btn.style.borderColor = '#EE5A24';
      btn.style.background = '#EE5A2415';
    }
    btn.style.pointerEvents = 'none';
  }

  setTimeout(() => {
    if (qIdx < currentCat.sentences.length - 1) {
      qIdx++;
      renderQuestion();
    } else {
      renderResults();
    }
  }, 1200);
}

function renderResults() {
  const total = currentCat.sentences.length;
  const pct = Math.round((score / total) * 100);
  const msg = pct === 100 ? '🏆 ¡Perfecto!' : pct >= 60 ? '👏 ¡Muy bien!' : '💪 ¡Sigue practicando!';
  let stars = pct === 100 ? '⭐⭐⭐' : pct >= 60 ? '⭐⭐' : '⭐';
  let html = `<div class="max-w-sm mx-auto text-center anim-pop">
    <div class="text-6xl mb-3 confetti">${pct === 100 ? '🎉' : '📊'}</div>
    <h2 class="text-2xl font-900 mb-1">${msg}</h2>
    <p class="text-3xl mb-2">${stars}</p>
    <div class="text-5xl font-900 mb-1" style="color:${currentCat.color}">${score}/${total}</div>
    <p class="text-gray-400 mb-6">${pct}% correcto</p>
    <div class="flex flex-col gap-3">
      <button onclick="startQuiz()" class="pill text-white font-800 px-6 py-3 rounded-full" style="background:${currentCat.color}">🔄 Intentar de Nuevo</button>
      <button onclick="selectCat('${currentCat.id}')" class="pill font-700 px-6 py-3 rounded-full border-2" style="border-color:${currentCat.color};color:${currentCat.color}">📖 Repasar Vocabulario</button>
      <button onclick="goHome()" class="pill font-700 px-6 py-3 rounded-full bg-gray-100 text-gray-600">🏠 Elegir otra categoría</button>
    </div>
  </div>`;
  content.innerHTML = html;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Element SDK
const defaultConfig = {
  main_title: '🎓 English Vocabulary Game',
  background_color: '#FFFFFF',
  accent_color: '#FF6B6B',
  text_color: '#1F2937',
  surface_color: '#F9FAFB',
  button_color: '#FF6B6B',
  font_family: 'Nunito',
  font_size: 16
};

function applyConfig(config) {
  document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
  document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
  document.body.style.color = config.text_color || defaultConfig.text_color;
  const font = config.font_family || defaultConfig.font_family;
  document.body.style.fontFamily = `${font}, Nunito, sans-serif`;
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => ({
      recolorables: [
        { get:()=>config.background_color||defaultConfig.background_color, set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v})} },
        { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v})} },
        { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})} },
        { get:()=>config.accent_color||defaultConfig.accent_color, set:(v)=>{config.accent_color=v;window.elementSdk.setConfig({accent_color:v})} },
        { get:()=>config.button_color||defaultConfig.button_color, set:(v)=>{config.button_color=v;window.elementSdk.setConfig({button_color:v})} }
      ],
      borderables: [],
      fontEditable: { get:()=>config.font_family||defaultConfig.font_family, set:(v)=>{config.font_family=v;window.elementSdk.setConfig({font_family:v})} },
      fontSizeable: { get:()=>config.font_size||defaultConfig.font_size, set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v})} }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['main_title', config.main_title || defaultConfig.main_title]
    ])
  });
}

renderHome();
lucide.createIcons();
</script>
