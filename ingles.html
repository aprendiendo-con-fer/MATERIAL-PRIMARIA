  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; }
    .fredoka { font-family: 'Fredoka', sans-serif; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,200,0,0.4); }
      50% { box-shadow: 0 0 20px 8px rgba(255,200,0,0.2); }
    }
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.08); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes star-spin {
      from { transform: rotate(0deg) scale(0); opacity: 0; }
      to { transform: rotate(360deg) scale(1); opacity: 1; }
    }
    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes pulse-scale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes slide-down {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .anim-float { animation: float 3s ease-in-out infinite; }
    .anim-pop { animation: popIn 0.4s ease-out forwards; }
    .anim-slide { animation: slideUp 0.5s ease-out forwards; }
    .anim-wiggle { animation: wiggle 0.5s ease-in-out; }
    .anim-bounce { animation: bounce-in 0.6s ease-out forwards; }
    .anim-star { animation: star-spin 0.8s ease-out forwards; }
    .anim-confetti { animation: confetti 1s ease-out forwards; }
    .anim-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .anim-pulse-scale { animation: pulse-scale 0.6s ease-in-out; }
    .anim-slide-down { animation: slide-down 0.4s ease-out forwards; }
    .rainbow-bg {
      background: linear-gradient(270deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6, #ff6b6b);
      background-size: 600% 600%;
      animation: rainbow 4s ease infinite;
    }

    .cat-btn { transition: all 0.2s ease; }
    .cat-btn:hover { transform: scale(1.06) translateY(-3px); }
    .cat-btn:active { transform: scale(0.97); }

    .option-btn { transition: all 0.15s ease; }
    .option-btn:hover { transform: scale(1.04); }
    .option-btn:active { transform: scale(0.96); }

    .card-item {
      opacity: 0;
      animation: popIn 0.4s ease-out forwards;
    }

    .progress-fill { transition: width 0.6s ease; }

    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      pointer-events: none;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

function applyConfig(config) {
  const title = config.game_title || defaultConfig.game_title;
  const subtitle = config.welcome_message || defaultConfig.welcome_message;
  const bg = config.background_color || defaultConfig.background_color;
  const cardC = config.card_color || defaultConfig.card_color;
  const textC = config.text_color || defaultConfig.text_color;
  const accent = config.accent_color || defaultConfig.accent_color;
  const btnC = config.button_color || defaultConfig.button_color;
  const font = config.font_family || defaultConfig.font_family;
  const fontSize = config.font_size || defaultConfig.font_size;

  const el = (id) => document.getElementById(id);
  if (el('main-title')) el('main-title').textContent = `🌟 ${title} 🌟`;
  if (el('main-subtitle')) el('main-subtitle').textContent = subtitle;

  document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, #764ba2 50%, #f093fb 100%)`;

  document.querySelectorAll('.vocab-card').forEach(c => {
    c.style.backgroundColor = cardC;
    c.style.color = textC;
  });

  document.querySelectorAll('.fredoka, h1, h2').forEach(e => {

  });

  const baseSize = fontSize;
  document.querySelectorAll('h1').forEach(e => e.style.fontSize = `${baseSize * 2.5}px`);
  document.querySelectorAll('h2').forEach(e => e.style.fontSize = `${baseSize * 2}px`);

    }
  });
}

// ========== RENDER FUNCTIONS ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(name) {
  document.getElementById('menu-screen').classList.toggle('hidden', name !== 'menu');
  document.getElementById('stage-screen').classList.toggle('hidden', name !== 'stage');
  document.getElementById('complete-screen').classList.toggle('hidden', name !== 'complete');
}

function renderCategories() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = '';
  const keys = Object.keys(CATEGORIES);
  keys.forEach((key, i) => {
    const cat = CATEGORIES[key];
    const btn = document.createElement('button');
    btn.className = 'cat-btn rounded-2xl p-4 md:p-5 text-center shadow-lg anim-pop cursor-pointer border-4 border-white/30';
    btn.style.animationDelay = `${i * 0.05}s`;
    btn.style.background = `linear-gradient(135deg, ${cat.color}, ${cat.colorDark})`;
    btn.innerHTML = `
      <div class="text-4xl md:text-5xl mb-2">${cat.emoji}</div>
      <div class="fredoka text-white font-bold text-sm md:text-base drop-shadow">${cat.label}</div>
    `;
    btn.onclick = () => startCategory(key);
    grid.appendChild(btn);
  });
}

function startCategory(key) {
  currentCategory = key;
  currentStage = 1;
  currentCardIndex = 0;
  score = 0;
  totalQuestions = 0;
  showScreen('stage');
  renderStage();
}

function renderStage() {
  const cat = CATEGORIES[currentCategory];
  const stageNames = ['', '📚 Etapa 1: Aprende', '📝 Etapa 2: Oraciones', '✏️ Etapa 3: Completa'];
  const stageDescs = ['', '¡Conoce el vocabulario!', '¡Lee oraciones en inglés!', '¡Completa la oración correcta!'];

  document.getElementById('stage-badge').textContent = stageNames[currentStage];
  document.getElementById('stage-title').innerHTML = `${cat.emoji} ${cat.label}`;
  document.getElementById('stage-desc').textContent = stageDescs[currentStage];

  const progress = ((currentStage - 1) / 3) * 100;
  document.getElementById('progress-bar').style.width = `${progress}%`;

  const content = document.getElementById('stage-content');
  content.innerHTML = '';

  if (currentStage === 1) renderLearnStage(content, cat);
  else if (currentStage === 2) renderSentenceStage(content, cat);
  else if (currentStage === 3) renderFillStage(content, cat);

  renderNav();
  lucide.createIcons();
}

function renderLearnStage(container, cat) {
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4';

  cat.words.forEach((word, i) => {
    const card = document.createElement('div');
    card.className = 'vocab-card card-item bg-white rounded-2xl p-4 text-center shadow-lg cursor-pointer hover:shadow-xl transition-all border-2 relative group';
    card.style.animationDelay = `${i * 0.06}s`;
    card.style.borderColor = cat.color + '40';
    
    const soundBtn = document.createElement('button');
    soundBtn.className = 'absolute top-2 right-2 bg-blue-500 text-white rounded-full p-2 opacity-0 group-hover:opacity-100 transition-opacity';
    soundBtn.innerHTML = '<i data-lucide="volume-2" style="width:16px;height:16px;"></i>';
    soundBtn.onclick = (e) => {
      e.stopPropagation();
      speak(word.en);
      soundBtn.classList.add('anim-pulse-scale');
      setTimeout(() => soundBtn.classList.remove('anim-pulse-scale'), 600);
    };
    
    card.innerHTML = `
      <div class="text-4xl md:text-5xl mb-2 anim-float" style="animation-delay:${i * 0.2}s">${word.icon}</div>
      <div class="fredoka text-lg md:text-xl font-bold" style="color:${cat.colorDark}">${word.en}</div>
      <div class="text-sm text-gray-500 mt-1">${word.es}</div>
    `;
    card.appendChild(soundBtn);
    card.onclick = () => {
      card.classList.add('anim-wiggle');
      speak(word.en);
      setTimeout(() => card.classList.remove('anim-wiggle'), 500);
    };
    grid.appendChild(card);
  });
  container.appendChild(grid);
}

function renderSentenceStage(container, cat) {
  const wrapper = document.createElement('div');
  wrapper.className = 'space-y-3';

  // Show 5 sentences at a time for better UX
  const startIdx = currentCardIndex;
  const endIdx = Math.min(startIdx + 5, cat.sentences.length);
  const showing = cat.sentences.slice(startIdx, endIdx);

  // Counter
  const counter = document.createElement('div');
  counter.className = 'text-center text-white/80 font-semibold mb-4';
  counter.textContent = `Oraciones ${startIdx + 1}-${endIdx} de ${cat.sentences.length}`;
  wrapper.appendChild(counter);

  showing.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'card-item bg-white/95 backdrop-blur-sm rounded-2xl p-4 md:p-5 shadow-lg border-l-4';
    card.style.animationDelay = `${i * 0.1}s`;
    card.style.borderLeftColor = cat.color;
    card.innerHTML = `
      <div class="flex items-start gap-3">
        <div class="text-2xl mt-1">${cat.words[startIdx + i]?.icon || '📖'}</div>
        <div class="flex-1">
          <p class="fredoka text-lg md:text-xl font-bold" style="color:${cat.colorDark}">${highlightWord(s.en, s.word)}</p>
          <p class="text-gray-500 mt-1 text-sm md:text-base">🇪🇸 ${s.es}</p>
        </div>
      </div>
    `;
    wrapper.appendChild(card);
  });

  container.appendChild(wrapper);
}

function highlightWord(sentence, word) {
  return sentence.replace(new RegExp(`(${word})`, 'gi'), '<span style="color:#7c3aed;text-decoration:underline;text-decoration-style:wavy;">$1</span>');
}

function renderFillStage(container, cat) {
  if (quizQuestions.length === 0) {
    quizQuestions = shuffle(cat.sentences.map(s => ({...s})));
    quizIndex = 0;
    totalQuestions = quizQuestions.length;
  }

  if (quizIndex >= quizQuestions.length) {
    showCompletion();
    return;
  }

  const q = quizQuestions[quizIndex];
  const blankSentence = q.en.replace(new RegExp(q.word, 'gi'), '________');

  // Generate options: correct + 3 random wrong
  const allWords = cat.words.map(w => w.en);
  let options = [q.word];
  const others = allWords.filter(w => w.toLowerCase() !== q.word.toLowerCase());
  const shuffledOthers = shuffle(others);
  options.push(...shuffledOthers.slice(0, 3));
  options = shuffle(options);

  const wrapper = document.createElement('div');
  wrapper.className = 'max-w-2xl mx-auto';

  // Question counter
  const counter = document.createElement('div');
  counter.className = 'text-center text-white/80 font-semibold mb-4 text-lg';
  counter.textContent = `Pregunta ${quizIndex + 1} de ${totalQuestions}`;
  wrapper.appendChild(counter);

  // Score
  const scoreDiv = document.createElement('div');
  scoreDiv.className = 'text-center mb-4';
  scoreDiv.innerHTML = `<span class="bg-yellow-400 text-purple-900 px-4 py-1 rounded-full font-bold fredoka text-lg">⭐ ${score} / ${quizIndex}</span>`;
  wrapper.appendChild(scoreDiv);

  // Question card
  const card = document.createElement('div');
  card.className = 'anim-slide bg-white/95 backdrop-blur-sm rounded-3xl p-6 md:p-8 shadow-xl text-center mb-6';
  card.innerHTML = `
    <div class="text-5xl mb-4">${cat.emoji}</div>
    <p class="fredoka text-xl md:text-2xl font-bold text-gray-800 mb-2">${blankSentence}</p>
    <p class="text-gray-500 text-sm">🇪🇸 ${q.es}</p>
  `;
  wrapper.appendChild(card);

  // Options
  const optGrid = document.createElement('div');
  optGrid.className = 'grid grid-cols-2 gap-3';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn card-item bg-white rounded-2xl p-4 md:p-5 text-center shadow-lg font-bold fredoka text-lg md:text-xl cursor-pointer border-3 border-transparent hover:border-purple-400 transition-all';
    btn.style.animationDelay = `${i * 0.1}s`;
    btn.style.color = cat.colorDark;
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(opt, q.word, optGrid, btn);
    optGrid.appendChild(btn);
  });
  wrapper.appendChild(optGrid);
  container.appendChild(wrapper);
}

function handleAnswer(selected, correct, optGrid, clickedBtn) {
  const isCorrect = selected.toLowerCase() === correct.toLowerCase();
  const buttons = optGrid.querySelectorAll('button');

  buttons.forEach(b => {
    b.onclick = null;
    b.style.cursor = 'default';
    b.classList.remove('hover:border-purple-400');
    if (b.textContent.toLowerCase() === correct.toLowerCase()) {
      b.style.backgroundColor = '#d4edda';
      b.style.borderColor = '#28a745';
      b.style.color = '#155724';
    } else if (b === clickedBtn && !isCorrect) {
      b.style.backgroundColor = '#f8d7da';
      b.style.borderColor = '#dc3545';
      b.style.color = '#721c24';
      b.classList.add('anim-wiggle');
    }
  });

  if (isCorrect) {
    score++;
    showFeedback(true);
  } else {
    showFeedback(false);
  }

  setTimeout(() => {
    quizIndex++;
    const content = document.getElementById('stage-content');
    content.innerHTML = '';
    renderFillStage(content, CATEGORIES[currentCategory]);
    renderNav();
  }, 1500);
}

function showFeedback(correct) {
  const overlay = document.getElementById('feedback-overlay');
  const box = document.getElementById('feedback-box');
  const emoji = document.getElementById('feedback-emoji');
  const text = document.getElementById('feedback-text');

  const msg = correct
    ? positiveMessages[Math.floor(Math.random() * positiveMessages.length)]
    : encourageMessages[Math.floor(Math.random() * encourageMessages.length)];

  box.style.backgroundColor = correct ? '#d4edda' : '#fff3cd';
  box.style.color = correct ? '#155724' : '#856404';
  emoji.textContent = msg.emoji;
  text.textContent = msg.text;

  overlay.classList.remove('hidden');
  box.classList.remove('anim-bounce');
  void box.offsetWidth;
  box.classList.add('anim-bounce');

  setTimeout(() => overlay.classList.add('hidden'), 1200);
}

function renderNav() {
  const nav = document.getElementById('stage-nav');
  nav.innerHTML = '';

  if (currentStage === 1) {
    const btn = document.createElement('button');
    btn.className = 'bg-yellow-400 text-purple-900 px-8 py-3 rounded-full font-bold text-lg fredoka cat-btn anim-glow shadow-lg';
    btn.innerHTML = 'Siguiente: Oraciones ➡️';
    btn.onclick = () => { currentStage = 2; currentCardIndex = 0; renderStage(); };
    nav.appendChild(btn);
  } else if (currentStage === 2) {
    const cat = CATEGORIES[currentCategory];
    const endIdx = currentCardIndex + 5;

    if (endIdx < cat.sentences.length) {
      const btn = document.createElement('button');
      btn.className = 'bg-white/30 text-white px-6 py-3 rounded-full font-bold text-lg fredoka cat-btn';
      btn.innerHTML = 'Más oraciones ➡️';
      btn.onclick = () => { currentCardIndex = endIdx; renderStage(); };
      nav.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'bg-yellow-400 text-purple-900 px-8 py-3 rounded-full font-bold text-lg fredoka cat-btn anim-glow shadow-lg';
    nextBtn.innerHTML = 'Siguiente: ¡A completar! ✏️';
    nextBtn.onclick = () => { currentStage = 3; quizQuestions = []; renderStage(); };
    nav.appendChild(nextBtn);
  }
  // Stage 3 nav is handled by quiz completion
}

function showCompletion() {
  showScreen('complete');
  const pct = totalQuestions > 0 ? Math.round((score / totalQuestions) * 100) : 0;
  const cat = CATEGORIES[currentCategory];

  document.getElementById('complete-msg').textContent = `¡Completaste ${cat.label}! ${cat.emoji}`;
  document.getElementById('complete-score').textContent = `Puntuación: ${score}/${totalQuestions} (${pct}%)`;

  document.getElementById('progress-bar').style.width = '100%';

  // Confetti effect
  const confettiContainer = document.getElementById('confetti-container');
  confettiContainer.innerHTML = '';
  const emojis = ['🌟', '⭐', '🎉', '🏆', '💎', '🎊', '✨'];
  for (let i = 0; i < 12; i++) {
    const span = document.createElement('span');
    span.className = 'anim-confetti absolute text-3xl';
    span.style.left = `${Math.random() * 200 - 100}px`;
    span.style.animationDelay = `${Math.random() * 0.5}s`;
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    confettiContainer.appendChild(span);
  }
}

// ========== EVENT LISTENERS ==========
document.getElementById('back-btn').onclick = () => {
  if (currentStage === 1) {
    showScreen('menu');
    currentCategory = null;
  } else {
    currentStage--;
    currentCardIndex = 0;
    quizQuestions = [];
    renderStage();
  }
};

document.getElementById('replay-btn').onclick = () => {
  startCategory(currentCategory);
};

document.getElementById('home-btn').onclick = () => {
  showScreen('menu');
  currentCategory = null;
  currentStage = 0;
};

// ========== INIT ==========
function speak(text) {
  if ('speechSynthesis' in window) {
    try {
      // Resume audio context if needed (for browser autoplay policies)
      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      }
      
      // Cancel any ongoing speech
      window.speechSynthesis.cancel();
      
      // Create utterance with optimized settings for Chrome
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      utterance.pitch = 1.1;
      utterance.volume = 1;
      
      // Get available voices and prefer English
      const voices = window.speechSynthesis.getVoices();
      const englishVoice = voices.find(v => v.lang.startsWith('en-US')) || voices.find(v => v.lang.startsWith('en'));
      if (englishVoice) {
        utterance.voice = englishVoice;
      }
      
      // Error handling
      utterance.onerror = (event) => {
        console.error('Speech error:', event.error);
      };
      
      // Speak immediately
      window.speechSynthesis.speak(utterance);
    } catch (e) {
      console.error('Speech synthesis error:', e);
    }
  }
}

// Load voices when available
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {
    // Voices loaded
  };
