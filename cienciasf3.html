      position: absolute;

    }

      right: 10%;

      height: 60px;

    // Funciones de navegación
    function showMainMenu() {
      document.getElementById('main-menu').classList.remove('hidden');
      document.getElementById('grade-menu').classList.add('hidden');
      document.getElementById('game-screen').classList.add('hidden');
    }

    function showGradeMenu(grade) {
      currentGrade = grade;
      document.getElementById('main-menu').classList.add('hidden');
      document.getElementById('grade-menu').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      
      const gradeTitle = document.getElementById('grade-title');
      gradeTitle.textContent = grade === 1 ? '🌱 Primer Grado - Nivel Fácil' : '🌻 Segundo Grado - Nivel Medio';
      
      renderGamesGrid(grade);
    }

    function renderGamesGrid(grade) {
      const container = document.getElementById('games-grid');
      const games = gamesData[grade];
      
      container.innerHTML = games.map((game, index) => `
        <button onclick="startGame(${grade}, ${index})" 
                class="btn-bounce bg-gradient-to-r ${game.color} text-white font-bold p-6 rounded-3xl shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 text-left">
          <div class="flex items-center gap-3 mb-3">
            <span class="text-4xl">${game.icon}</span>
            <span class="text-xl">${game.title}</span>
          </div>
          <div class="bg-white/20 rounded-xl p-3 text-sm">
            <div class="flex items-center gap-2 mb-1">
              <span>📚</span>
              <span class="font-semibold">Contenido:</span>
            </div>
            <p class="text-white/90 text-xs leading-relaxed">${game.content.substring(0, 100)}...</p>
          </div>
        </button>
      `).join('');
    }

    function startGame(grade, gameIndex) {
      currentGame = gamesData[grade][gameIndex];
      score = 0;
      currentQuestionIndex = 0;
      questions = [...currentGame.questions].sort(() => Math.random() - 0.5).slice(0, 10);
      
      document.getElementById('main-menu').classList.add('hidden');
      document.getElementById('grade-menu').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('game-complete').classList.add('hidden');
      document.getElementById('question-container').classList.remove('hidden');
      
      // Configurar escenario
      setScene(currentGame.scene);
      
      // Configurar título y contenido
      document.getElementById('game-title').textContent = currentGame.title;
      document.getElementById('learning-content-text').textContent = currentGame.content;
      document.getElementById('score').textContent = score;
      
      showQuestion();
    }

    function showQuestion() {
      if (currentQuestionIndex >= questions.length) {
        showGameComplete();
        return;
      }
      
      const question = questions[currentQuestionIndex];
      document.getElementById('question-text').textContent = question.q;
      
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = question.options.map((option, index) => `
        <button onclick="checkAnswer(${index}, ${question.correct})" 
                class="option-btn bg-gradient-to-r from-blue-400 to-blue-500 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-300 text-lg">
          ${option}
        </button>
      `).join('');
      
      document.getElementById('feedback-container').classList.add('hidden');
    }

    function checkAnswer(selected, correct) {
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => btn.disabled = true);
      
      const feedbackContainer = document.getElementById('feedback-container');
      const feedbackText = document.getElementById('feedback-text');
      
      if (selected === correct) {
        score += 10;
        document.getElementById('score').textContent = score;
        buttons[selected].classList.add('correct-answer');
        buttons[selected].classList.remove('from-blue-400', 'to-blue-500');
        buttons[selected].classList.add('bg-green-500');
        feedbackText.textContent = '🎉 ¡Correcto! ¡Muy bien!';
        feedbackText.className = 'text-2xl font-bold text-green-400 drop-shadow-lg';
      } else {
        buttons[selected].classList.add('wrong-answer');
        buttons[selected].classList.remove('from-blue-400', 'to-blue-500');
        buttons[selected].classList.add('bg-red-500');
        buttons[correct].classList.remove('from-blue-400', 'to-blue-500');
        buttons[correct].classList.add('bg-green-500');
        feedbackText.textContent = '😅 ¡Casi! La respuesta correcta está en verde';
        feedbackText.className = 'text-2xl font-bold text-yellow-300 drop-shadow-lg';
      }
      
      feedbackContainer.classList.remove('hidden');
      
      setTimeout(() => {
        currentQuestionIndex++;
        showQuestion();
      }, 2000);
    }

    function showGameComplete() {
      document.getElementById('question-container').classList.add('hidden');
      document.getElementById('feedback-container').classList.add('hidden');
      document.getElementById('game-complete').classList.remove('hidden');
      document.getElementById('final-score').textContent = score;
    }

    function backToGradeMenu() {
      showGradeMenu(currentGrade);
    }

    // SDK Integration
    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      
      const mainTitle = document.getElementById('main-title');
      if (mainTitle) {
        mainTitle.innerHTML = `🌿 ${config.main_title || defaultConfig.main_title} 🌿`;
      }
      
      const authorCredits = document.querySelectorAll('#author-credit, footer');
      authorCredits.forEach(el => {
        if (el.id === 'author-credit' || el.textContent.includes('Material creado')) {
          el.textContent = `Material creado por ${config.author_name || defaultConfig.author_name}`;
        }
      });
    }

    // Initialize SDK

        }),

          ['main_title', cfg.main_title || defaultConfig.main_title],
          ['author_name', cfg.author_name || defaultConfig.author_name]
        ])
      });
    }
