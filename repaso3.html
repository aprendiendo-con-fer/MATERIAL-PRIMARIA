  main_title: '🎮 Aprende Jugando 🎮',
  subtitle: '3° Grado de Primaria',
  teacher_name: 'Maestra María Fernanda Flores Valenzuela',
  background_color: '#E8F4FC',
  primary_color: '#6366F1',
  text_color: '#4338CA',
  button_color: '#8B5CF6',
  accent_color: '#EC4899'
};

// Data SDK Handler
const dataHandler = {
  onDataChanged(data) {
    gameScores = data;
    updateProgressDisplay();
    renderGameCards();
  }
};

// Initialize SDKs
async function initApp() {
  // Init Element SDK
  if (window.elementSdk) {
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('main-title').textContent = config.main_title || defaultConfig.main_title;
        document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
        document.getElementById('teacher-credit').textContent = 'Creado por ' + (config.teacher_name || defaultConfig.teacher_name);
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => config.button_color || defaultConfig.button_color,
            set: (v) => { config.button_color = v; window.elementSdk.setConfig({ button_color: v }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle],
        ['teacher_name', config.teacher_name || defaultConfig.teacher_name]
      ])
    });
  }
  
  // Init Data SDK
  if (window.dataSdk) {
    const result = await window.dataSdk.init(dataHandler);
    if (!result.isOk) {
      console.error('Failed to initialize Data SDK');
    }
  }
  
  renderGameCards();
}

function renderGameCards() {
  const grid = document.getElementById('games-grid');
  grid.innerHTML = '';
  
  games.forEach((game, index) => {
    const savedScore = gameScores.find(s => s.game_id === game.id);
    const stars = savedScore ? savedScore.stars : 0;
    const completed = stars > 0;
    
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer h-full" onclick="startGame('${game.id}')">
        <div class="bg-gradient-to-br ${game.color} p-4 text-center">
          <span class="text-4xl block mb-1">${game.icon}</span>
          <span class="category-badge bg-white/30 text-white font-semibold">${game.category}</span>
        </div>
        <div class="p-3 text-center">
          <h3 class="font-bold text-indigo-700 text-sm mb-2 leading-tight">${game.name}</h3>
          <div class="flex justify-center gap-1">
            ${[1,2,3].map(i => `<span class="text-lg ${i <= stars ? '' : 'opacity-30'}">${i <= stars ? '⭐' : '☆'}</span>`).join('')}
          </div>
          ${completed ? '<span class="text-xs text-green-500 font-semibold">✓ Completado</span>' : '<span class="text-xs text-indigo-400">¡Jugar!</span>'}
        </div>
      </div>
    `;
    card.style.animationDelay = `${index * 50}ms`;
    card.classList.add('bounce-in');
    grid.appendChild(card);
  });
}

function updateProgressDisplay() {
  const completed = gameScores.filter(s => s.stars > 0).length;
  const totalStars = gameScores.reduce((sum, s) => sum + (s.stars || 0), 0);
  const maxStars = games.length * 3;
  
  document.getElementById('progress-text').textContent = `${completed}/20 juegos`;
  document.getElementById('progress-bar').style.width = `${(completed / games.length) * 100}%`;
  
  const starsDisplay = document.getElementById('stars-display');
  starsDisplay.innerHTML = `<span class="text-yellow-500 font-bold">⭐ ${totalStars}/${maxStars}</span>`;
}

function startGame(gameId) {
  currentGame = games.find(g => g.id === gameId);
  currentQuestionIndex = 0;
  currentScore = 0;
  
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('current-score').textContent = '0';
  
  loadQuestion();
}

function loadQuestion() {
  const questions = gameQuestions[currentGame.id];
  if (currentQuestionIndex >= questions.length) {
    endGame();
    return;
  }
  
  const question = questions[currentQuestionIndex];
  const container = document.getElementById('game-container');
  
  container.innerHTML = `
    <div class="text-center">
      <div class="mb-4">
        <span class="text-5xl">${currentGame.icon}</span>
      </div>
      <h2 class="title-font text-2xl text-indigo-600 mb-2">${currentGame.name}</h2>
      <div class="flex justify-center gap-2 mb-4">
        ${Array(questions.length).fill().map((_, i) => `
          <div class="w-3 h-3 rounded-full ${i < currentQuestionIndex ? 'bg-green-400' : i === currentQuestionIndex ? 'bg-indigo-500 pulse-glow' : 'bg-gray-200'}"></div>
        `).join('')}
      </div>
      <div class="bg-gradient-to-r ${currentGame.color} text-white rounded-2xl p-6 mb-6 shadow-lg">
        <p class="text-xl font-bold">${question.q}</p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        ${question.options.map((opt, i) => `
          <button onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', '${question.answer.replace(/'/g, "\\'")}')" 
                  class="btn-game bg-white hover:bg-indigo-50 text-indigo-700 font-bold py-4 px-6 rounded-xl shadow-md border-2 border-indigo-100 hover:border-indigo-300 text-lg">
            ${opt}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function checkAnswer(selected, correct) {
  const buttons = document.querySelectorAll('#game-container button');
  buttons.forEach(btn => btn.disabled = true);
  
  const isCorrect = selected === correct;
  
  buttons.forEach(btn => {
    if (btn.textContent.trim() === correct) {
      btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
    } else if (btn.textContent.trim() === selected && !isCorrect) {
      btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700', 'shake');
    }
  });
  
  if (isCorrect) {
    currentScore += 20;
    document.getElementById('current-score').textContent = currentScore;
    
    // Show celebration
    showFeedback('¡Correcto! 🎉', 'text-green-500');
  } else {
    showFeedback('¡Inténtalo de nuevo! 💪', 'text-orange-500');
  }
  
  setTimeout(() => {
    currentQuestionIndex++;
    loadQuestion();
  }, 1200);
}

function showFeedback(text, colorClass) {
  const container = document.getElementById('game-container');
  const feedback = document.createElement('div');
  feedback.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-3xl font-bold ${colorClass} bounce-in z-50 bg-white/90 px-8 py-4 rounded-2xl shadow-xl`;
  feedback.textContent = text;
  container.appendChild(feedback);
  
  setTimeout(() => feedback.remove(), 1000);
}

async function endGame() {
  const questions = gameQuestions[currentGame.id];
  const maxScore = questions.length * 20;
  const percentage = (currentScore / maxScore) * 100;
  
  let stars = 0;
  if (percentage >= 40) stars = 1;
  if (percentage >= 70) stars = 2;
  if (percentage >= 90) stars = 3;
  
  // Save score
  if (window.dataSdk && gameScores.length < 999) {
    const existingScore = gameScores.find(s => s.game_id === currentGame.id);
    
    if (existingScore) {
      if (stars > existingScore.stars || currentScore > existingScore.score) {
        const result = await window.dataSdk.update({
          ...existingScore,
          score: Math.max(currentScore, existingScore.score),
          stars: Math.max(stars, existingScore.stars),
          completed_at: new Date().toISOString()
        });
        if (!result.isOk) console.error('Error updating score');
      }
    } else {
      const result = await window.dataSdk.create({
        game_id: currentGame.id,
        game_name: currentGame.name,
        score: currentScore,
        stars: stars,
        completed_at: new Date().toISOString()
      });
      if (!result.isOk) console.error('Error saving score');
    }
  }
  
  // Show results
  showResults(stars, percentage);
}

function showResults(stars, percentage) {
  const modal = document.getElementById('results-modal');
  const emojis = ['😢', '😊', '🎉', '🏆'];
  const titles = ['¡Sigue practicando!', '¡Bien hecho!', '¡Excelente!', '¡Increíble!'];
  const messages = [
    'La práctica hace al maestro',
    'Vas por buen camino',
    '¡Eres muy inteligente!',
    '¡Eres un campeón!'
  ];
  
  document.getElementById('result-emoji').textContent = emojis[stars];
  document.getElementById('result-title').textContent = titles[stars];
  document.getElementById('result-message').textContent = messages[stars];
  document.getElementById('final-score').textContent = currentScore;
  
  document.getElementById('result-stars').innerHTML = [1,2,3].map(i => `
    <span class="text-4xl ${i <= stars ? 'star-pop' : 'opacity-30'}" style="animation-delay: ${i * 150}ms">${i <= stars ? '⭐' : '☆'}</span>
  `).join('');
  
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function backToMenu() {
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('main-menu').classList.remove('hidden');
  document.getElementById('results-modal').classList.add('hidden');
  document.getElementById('results-modal').classList.remove('flex');
  currentGame = null;
}

// Initialize on load
initApp();
</script>
